name: '217. WHMCS - Client Fields Survey (aggregate, no PII) [WHMCS]'
run-name: 'WHMCS Client Fields Survey'

# Phase 1 of docs/whmcs-data-quality-and-metrics-plan.md: throttled per-client
# GetClientsDetails loop measuring how the three classification signals line
# up — the Legal Organization Status custom field, the native client group,
# and charity-product evidence. Only exact legal-status vocabulary matches are
# counted; free-text values are never printed. Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description:
          'WHMCS API endpoint (e.g., https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      throttle_ms:
        description: 'Delay between per-client detail calls (ms)'
        required: false
        type: string
        default: '150'
      output_file:
        description: 'Output JSON filename'
        required: false
        type: string
        default: 'artifacts/whmcs/whmcs_client_fields_survey.json'

permissions:
  contents: read
  id-token: write

jobs:
  client_fields_survey:
    runs-on: windows-latest
    environment: whmcs-prod-read

    steps:
      - uses: actions/checkout@v7.0.1

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ vars.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Survey client classification fields (read-only, no PII)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = "${{ inputs.output_file }}"

          & pwsh -NoProfile -File .\scripts\whmcs-client-fields-survey.ps1 -ApiUrl $env:WHMCS_API_URL -OutputFile $out -ThrottleMs ([int]'${{ inputs.throttle_ms }}')

          if ($LASTEXITCODE -ne 0) {
            throw "WHMCS client fields survey script failed with exit code $LASTEXITCODE. See logs above."
          }

          if (-not (Test-Path $out)) {
            throw "Expected output file not found: $out"
          }

      - name: Upload survey artifact (aggregate only)
        uses: actions/upload-artifact@v7
        with:
          name: whmcs_client_fields_survey
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
