name: '702. Domain - Deploy Static Clone to FFC-EX Repo'
run-name:
  "Clone+deploy ${{ inputs.domain }} -> ${{ inputs.ffc_ex_repo || format('FFC-EX-{0}',
  inputs.domain) }}"

# Regenerates an FFC-EX site as a faithful static clone of the live WordPress
# site and opens a PR on the target FFC-EX repo. Pipeline (all proven locally):
#   clone-site-static.mjs (httrack) -> integrate-clone-into-nextjs.mjs ->
#   next build (output: 'export') so the Next.js app serves the exact clone.
# See docs/ffc-ex-static-clone-runbook.md.
#
# Auth: uses CBM_TOKEN (cross-repo PAT, same secret create-repo.yml uses) to
# check out the FFC-EX repo and push a branch + open a PR there. Non-destructive:
# it never pushes to the FFC-EX default branch, only opens a PR for review.

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Live apex domain to clone (e.g. browncanyonranch.org)'
        required: true
        type: string
      ffc_ex_repo:
        description: 'Target FFC-EX repo name (default: FFC-EX-<domain>)'
        required: false
        type: string
      depth:
        description: 'httrack mirror depth'
        required: false
        type: string
        default: '8'
      exclude:
        description: 'Comma-separated paths to exclude (e.g. /beta,/members)'
        required: false
        type: string
        default: ''
      build_check:
        description: 'Run `npm ci && npm run build` in the FFC-EX repo to verify the export'
        required: false
        type: boolean
        default: true
      force:
        description:
          'Re-clone even though the target already serves a live site (the PR this opens would
          supersede the existing migration). Leave false unless you are deliberately regenerating.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Serialize per-domain so two clones of the same domain can't push branches / open PRs in parallel.
concurrency:
  group: ffc-ex-clone-deploy-${{ inputs.domain }}
  cancel-in-progress: false

jobs:
  # Reality check BEFORE the approval gate: verifies the target repo exists (resolving its
  # canonical casing — github.io paths are case-sensitive, so a wrong-case guess probes the
  # wrong URL) and refuses to re-clone a site that is already live unless force=true. Runs
  # ungated so a doomed or dangerous dispatch fails fast without consuming a human approval.
  # Added after the 2026-07-18 incident: a stale inventory led to a clone being dispatched
  # against FFC-EX-AllTypeTowing.com, a completed migration already cut over on its apex.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      repo_name: ${{ steps.verify.outputs.repo_name }}
    steps:
      - name: Verify target state (exists, not already live)
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ORG: FreeForCharity
          IN_DOMAIN: ${{ inputs.domain }}
          IN_REPO: ${{ inputs.ffc_ex_repo }}
          IN_FORCE: ${{ inputs.force }}
        shell: bash
        run: |
          set -euo pipefail

          name="${IN_REPO:-}"
          if [ -z "$name" ]; then name="FFC-EX-${IN_DOMAIN}"; fi
          name="${name##*/}"

          # --- repo must exist (resolve canonical casing via the API) -----------------
          set +e
          resp=$(gh api "repos/$TARGET_ORG/$name" 2>&1)
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            if printf '%s' "$resp" | grep -q "HTTP 404"; then
              echo "::error::Target repo $TARGET_ORG/$name does not exist. Create it first with workflow 720 (Repo - Create GitHub Repo), then re-dispatch this clone."
            else
              echo "::error::Preflight could not verify $TARGET_ORG/$name (transient API error?). Failing safe rather than guessing. Details: $resp"
            fi
            exit 1
          fi
          canonical=$(printf '%s' "$resp" | jq -r '.full_name // empty' 2>/dev/null || true)
          if [ -z "$canonical" ]; then
            echo "::error::Preflight got an unparseable response for $TARGET_ORG/$name. Failing safe."
            exit 1
          fi
          canonical_name="${canonical##*/}"

          # Archived repos are read-only: the gated job would fail at push/PR time after
          # consuming a human approval. No force override — no flag makes it writable.
          archived=$(printf '%s' "$resp" | jq -r '.archived // false' 2>/dev/null || true)
          if [ "$archived" = "true" ]; then
            echo "::error::$canonical is archived (read-only) — the clone would fail at push/PR time. Unarchive it in Settings (or pick the right target) before re-dispatching. force=true does not override this."
            echo "⛔ Refused: \`$canonical\` is archived (read-only)." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # --- is the site already live? (canonical-case default URL + apex) ----------
          pages_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 -L \
            "https://freeforcharity.github.io/${canonical_name}/" 2>/dev/null || echo "000")
          # tr -d '\r' first: HTTP header lines end in CR, and awk would otherwise keep it
          # in the captured status code ("200\r" != "200" — a false negative that would let
          # a live site through).
          apex_headers=$(curl -sSIL --max-time 20 "https://${IN_DOMAIN}/" 2>/dev/null | tr -d '\r' || true)
          apex_code=$(printf '%s\n' "$apex_headers" | awk 'toupper($1) ~ /^HTTP/ { c = $2 } END { print c }')
          apex_server=$(printf '%s\n' "$apex_headers" | grep -i '^server:' | tail -n1 | sed -E 's/^[Ss]erver:[[:space:]]*//')

          cutover=false
          if [ "${apex_code:-}" = "200" ] && printf '%s' "$apex_server" | grep -qi 'github'; then
            cutover=true
          fi
          pages_live=false
          if [ "$pages_code" = "200" ]; then pages_live=true; fi


          {
            echo "## Clone preflight — ${IN_DOMAIN}"
            echo "- Target repo: \`$canonical\` (exists)"
            echo "- Default Pages URL: HTTP $pages_code"
            echo "- Apex: HTTP ${apex_code:-000}, Server: ${apex_server:-<none>}$([ "$cutover" = "true" ] && echo ' — **cut over to GitHub Pages**')"
          } >> "$GITHUB_STEP_SUMMARY"

          if { [ "$cutover" = "true" ] || [ "$pages_live" = "true" ]; } && [ "${IN_FORCE:-false}" != "true" ]; then
            echo "::error::$canonical already serves a live site (default URL HTTP $pages_code; apex ${apex_code:-000}/${apex_server:-none}). Re-cloning would supersede a completed migration. If that is deliberate, re-dispatch with force=true."
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⛔ Refused: target already live. Re-dispatch with \`force=true\` only if regenerating deliberately." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # --- sibling scan: does the org already host ANOTHER repo for this domain? ---
          # An exact-name check is too strict: TechnologyMonastery.org (no FFC-EX prefix)
          # was the charity's real, active Next.js site while FFC-EX-technologymonastery.org
          # was empty. Match the FULL domain (case-insensitive) inside every org repo name —
          # full-domain matching keeps legitimate sibling domains apart (letsdanceactivities
          # .org vs .com do not match each other). The scan FAILS SAFE: an org-list API
          # error refuses rather than silently disabling the guard. force=true skips it.
          if [ "${IN_FORCE:-false}" != "true" ]; then
            set +e
            org_repos=$(gh api "orgs/$TARGET_ORG/repos?per_page=100" --paginate --jq '.[].name' 2>&1)
            list_rc=$?
            set -e
            if [ $list_rc -ne 0 ]; then
              echo "::error::Preflight could not list org repos for the sibling scan (transient API error?). Failing safe rather than guessing. Details: $org_repos"
              exit 1
            fi
            siblings=$(printf '%s\n' "$org_repos" | grep -iF -- "$IN_DOMAIN" | grep -ivx -- "$canonical_name" || true)
            if [ -n "$siblings" ]; then
              {
                echo "⛔ Refused: sibling org repo(s) match \`$IN_DOMAIN\` — one may be the real site:"
                while IFS= read -r s; do echo "- \`$s\`"; done <<< "$siblings"
                echo ""
                echo "Investigate, then re-dispatch with \`force=true\` if this clone is deliberate."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::error::The org already hosts other repo(s) matching $IN_DOMAIN: $(printf '%s' "$siblings" | tr '\n' ' '). One of them may be the charity's real site — investigate before cloning. If this clone is deliberate, re-dispatch with force=true."
              exit 1
            fi
          else
            echo "- force=true: sibling-domain scan skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "repo_name=$canonical_name" >> "$GITHUB_OUTPUT"

  clone-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preflight
    # CBM_TOKEN (cross-repo PAT) lives in the github-prod environment.
    environment: github-prod
    steps:
      - name: Check out automation repo (clone + integration scripts)
        uses: actions/checkout@v7
        with:
          path: automation

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install httrack
        run: sudo apt-get update && sudo apt-get install -y httrack

      - name: Resolve target repo
        id: target
        run: |
          # Canonical casing resolved by the preflight job (github.io paths and display
          # are case-sensitive even though the git/API layer is not).
          repo="${{ needs.preflight.outputs.repo_name }}"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "branch=clone/static-from-live-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Clone the live site (httrack)
        working-directory: automation
        run: |
          node scripts/clone-site-static.mjs \
            --domain "${{ inputs.domain }}" \
            --out "$RUNNER_TEMP/clone" \
            --depth "${{ inputs.depth }}" \
            ${{ inputs.exclude && format('--exclude {0}', inputs.exclude) || '' }}
          cat "$RUNNER_TEMP/clone/clone-report.json"

      - name: Check out target FFC-EX repo
        uses: actions/checkout@v7
        with:
          repository: 'FreeForCharity/${{ steps.target.outputs.repo }}'
          token: ${{ secrets.CBM_TOKEN }}
          path: ffc-ex
          fetch-depth: 0

      - name: Integrate clone into the Next.js app
        run: |
          node automation/scripts/integrate-clone-into-nextjs.mjs \
            --clone "$RUNNER_TEMP/clone/${{ inputs.domain }}" \
            --repo ffc-ex \
            --domain "${{ inputs.domain }}"

      - name: Verify Next.js static export builds
        if: ${{ inputs.build_check }}
        working-directory: ffc-ex
        run: |
          npm ci
          npm run build
          if [ -f out/index.html ]; then
            echo "out/index.html present"
          else
            echo "missing out/index.html"
            exit 1
          fi

      - name: Commit and open PR on the FFC-EX repo
        working-directory: ffc-ex
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }}
        run: |
          git config user.name 'ffc-clone-bot'
          git config user.email 'noreply@freeforcharity.org'
          branch='${{ steps.target.outputs.branch }}'
          git checkout -b "$branch"
          git add -A
          # --no-verify: the cloned WordPress assets must not run through the
          # FFC-EX repo's husky/lint-staged pre-commit hooks (minified CSS/JS).
          git commit --no-verify \
            -m "Replace template scaffold with faithful static clone of live ${{ inputs.domain }}" \
            -m "Generated by automation workflow 27 (clone-site-static.mjs + integrate-clone-into-nextjs.mjs). The Next.js output:'export' build now serves the exact live WordPress visuals; template page routes moved to _disabled_template_routes/."
          git push -u origin "$branch"
          gh pr create --repo "FreeForCharity/${{ steps.target.outputs.repo }}" \
            --base main --head "$branch" --draft \
            --title "Static clone of live ${{ inputs.domain }} (replaces template scaffold)" \
            --body "Automated faithful static clone of the live WordPress site, served via the existing Next.js \`output: 'export'\` build. See the automation repo's docs/ffc-ex-static-clone-runbook.md. Review the visual fidelity against the live site before merging/cutover."
