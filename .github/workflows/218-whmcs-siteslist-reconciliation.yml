name: '218. WHMCS - Sites-List Reconciliation + Product Alignment [WHMCS]'
run-name: 'WHMCS x Sites-List Reconciliation'

# Phase 1 of docs/whmcs-data-quality-and-metrics-plan.md: joins the sites-list
# (WHMCS + Cloudflare + WPMUDEV + health) with live WHMCS domains/services to
# measure (a) the coverage gap (legacy-WP orgs with no WHMCS record) and
# (b) the product-alignment gap — Cloudflare domains whose client lacks the
# 'Domain Registered in Cloudflare' product (pid 39) and GitHub Pages sites
# whose client lacks 'Hosted by GitHub Pages' (pid 40). Summary is aggregate
# counts; the artifact carries the gap domain lists (org domains, public
# project data) as the Phase 2 backfill work-list. Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description:
          'WHMCS API endpoint (e.g., https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      cloudflare_pid:
        description: 'WHMCS product id representing "Domain Registered in Cloudflare"'
        required: false
        type: string
        default: '39'
      github_pages_pid:
        description: 'WHMCS product id representing "Hosted by GitHub Pages"'
        required: false
        type: string
        default: '40'
      output_file:
        description: 'Output JSON filename'
        required: false
        type: string
        default: 'artifacts/whmcs/whmcs_siteslist_reconciliation.json'

permissions:
  contents: read
  id-token: write

jobs:
  siteslist_reconciliation:
    runs-on: windows-latest
    environment: whmcs-prod-read

    steps:
      - uses: actions/checkout@v7

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ vars.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Reconcile WHMCS with the sites-list (read-only)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = "${{ inputs.output_file }}"

          & pwsh -NoProfile -File .\scripts\whmcs-siteslist-reconciliation.ps1 -ApiUrl $env:WHMCS_API_URL -OutputFile $out -CloudflareProductPid '${{ inputs.cloudflare_pid }}' -GithubPagesProductPid '${{ inputs.github_pages_pid }}'

          if ($LASTEXITCODE -ne 0) {
            throw "WHMCS sites-list reconciliation script failed with exit code $LASTEXITCODE. See logs above."
          }

          if (-not (Test-Path $out)) {
            throw "Expected output file not found: $out"
          }

      - name: Upload reconciliation artifact
        uses: actions/upload-artifact@v7
        with:
          name: whmcs_siteslist_reconciliation
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
