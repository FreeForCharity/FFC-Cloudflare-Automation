name: '736. Repo - Archive / Application Denied (Admin) [Repo]'
run-name: 'Archive ${{ inputs.repo }} (dry_run=${{ inputs.dry_run }})'

# Destructive-adjacent, so heavily guarded. This workflow ONLY archives a repository
# (`archived: true`) вЂ” it NEVER deletes one. Archiving is fully reversible (a maintainer can
# unarchive from Settings), which is the deliberate safety choice: the worst case is a repo
# that is temporarily read-only, not data loss.
#
# Five guards, all must pass for a live archive:
#   1. dispatch-only (never issue/label triggered вЂ” no accidental auto-archive)
#   2. dry_run defaults to true (preview only; you must pass dry_run=false)
#   3. typed confirmation: confirm_repo must exactly equal repo
#   4. org lock + hard denylist (refuses anything outside FreeForCharity, and always refuses
#      the automation repo, the website template, and the org-wide .github repo)
#   5. github-prod environment approval gate (a human reviewer must approve the deployment)

on:
  workflow_dispatch:
    inputs:
      repo:
        description:
          'Repository to archive вЂ” "name" or "owner/name" (e.g. FFC-EX-example.org); any owner
          prefix is stripped and the owner is forced to FreeForCharity.'
        required: true
        type: string
      reason:
        description:
          'Why (e.g. "charity application denied", "domain abandoned"). Recorded in the summary.'
        required: true
        type: string
      dry_run:
        description:
          'Preview only. Leave true to see what would happen; set false to actually archive.'
        required: true
        default: true
        type: boolean
      confirm_repo:
        description:
          'Type the exact repo name again to confirm a live archive (must match "repo"). Ignored on
          dry runs.'
        required: false
        type: string
      issue_number:
        description:
          'Optional issue number in THIS repo to close as "not planned" (e.g. the denied website
          request).'
        required: false
        type: string

permissions:
  contents: read
  issues: write

env:
  TARGET_ORG: FreeForCharity
  # Repos that must never be archived by this automation, whatever is typed.
  DENYLIST: 'FFC-Cloudflare-Automation FFC_Single_Page_Template .github'

jobs:
  # Reality check BEFORE the approval gate. Only applies to a live archive
  # (dry_run=false) вЂ” a dry run is itself the evidence this preflight later
  # requires, so it always passes through untouched. Added after the
  # 2026-07-18 incident: a dry_run=false archive of an ACTIVE repo (pushed 25
  # minutes earlier, Pages enabled, referenced by an open issue) reached the
  # gate because the only dry-run that day targeted a different, nonexistent
  # repo вЂ” nothing verified the live target matched what had been previewed.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify target state and matching dry-run
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ORG: FreeForCharity
          IN_REPO: ${{ inputs.repo }}
          IN_DRY_RUN: ${{ inputs.dry_run }}
          THIS_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # Dry runs are the evidence a later live archive needs вЂ” they are
          # never blocked here (the archive job's own dry-run branch reports
          # the preview).
          if [ "${IN_DRY_RUN:-true}" != "false" ]; then
            echo "в„№пёЏ Dry run вЂ” preflight checks apply only to a live (dry_run=false) archive." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # --- normalize + validate the repo name (mirrors the archive job) ----------
          repo_raw="${IN_REPO:-}"
          name="${repo_raw##*/}"
          name="$(printf '%s' "$name" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "$name" ]; then echo '::error::repo is empty.'; exit 1; fi
          if ! printf '%s' "$name" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "::error::Invalid repository name: $name"; exit 1
          fi
          full="$TARGET_ORG/$name"

          for deny in $DENYLIST; do
            if [ "$name" = "$deny" ]; then
              echo "::error::Refusing to archive protected repository '$name' (denylist)."
              exit 1
            fi
          done

          echo "## Archive preflight вЂ” $full" >> "$GITHUB_STEP_SUMMARY"

          # --- must exist, must not already be archived (fail fast, no wasted gate) --
          set +e
          meta=$(gh api "repos/$full" 2>&1)
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            if printf '%s' "$meta" | grep -q "HTTP 404"; then
              echo "::error::Repository $full does not exist (or is private and not visible to this workflow's GITHUB_TOKEN) вЂ” nothing to archive."
              echo "в›” Refused: \`$full\` not found." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error::Preflight could not verify $full (transient API error?). Failing safe rather than guessing. Details: $meta"
            fi
            exit 1
          fi
          name_field=$(printf '%s' "$meta" | jq -r '.name // empty' 2>/dev/null || true)
          if [ -z "$name_field" ]; then
            echo "::error::Preflight got an unparseable response for $full. Failing safe rather than guessing."
            exit 1
          fi
          already=$(printf '%s' "$meta" | jq -r '.archived // false' 2>/dev/null || echo false)
          if [ "$already" = "true" ]; then
            echo "::error::$full is already archived вЂ” a live archive would be a no-op."
            echo "в›” Refused: \`$full\` is already archived." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          pushed=$(printf '%s' "$meta" | jq -r '.pushed_at // empty' 2>/dev/null || true)
          has_pages=$(printf '%s' "$meta" | jq -r '.has_pages // false' 2>/dev/null || echo false)

          # --- require a matching successful dry_run=true run within 48h -------------
          cutoff=$(date -u -d '48 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          set +e
          runs=$(gh api "repos/$THIS_REPO/actions/workflows/736-repo-archive.yml/runs?status=success&per_page=30" 2>&1)
          runs_rc=$?
          set -e
          if [ $runs_rc -ne 0 ]; then
            echo "::error::Preflight could not list prior 736 runs to verify a matching dry-run (transient API error?). Failing safe. Details: $runs"
            exit 1
          fi
          name_lc=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          found=0
          titles=$(printf '%s' "$runs" | jq -r --arg cutoff "$cutoff" '.workflow_runs[] | select(.created_at >= $cutoff) | .display_title' 2>/dev/null || true)
          while IFS= read -r title; do
            [ -z "$title" ] && continue
            title_lc=$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]')
            if printf '%s' "$title_lc" | grep -q 'dry_run=true' && printf '%s' "$title_lc" | grep -qF -- "$name_lc"; then
              found=1
              break
            fi
          done <<< "$titles"
          if [ "$found" -ne 1 ]; then
            echo "::error::No successful dry_run=true run of 736 for '$name' found in the last 48h. Dispatch with dry_run=true first, review the preview, then re-dispatch with dry_run=false for the same repo."
            echo "в›” Refused: no matching dry-run within 48h for \`$name\`." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "- Matching dry-run: found within the last 48h." >> "$GITHUB_STEP_SUMMARY"

          # --- advisory warnings: does this still look like a live/active repo? ------
          if [ -n "${pushed:-}" ]; then
            pushed_epoch=$(date -u -d "$pushed" +%s 2>/dev/null || echo 0)
            cutoff7_epoch=$(date -u -d '7 days ago' +%s)
            if [ "$pushed_epoch" -gt "$cutoff7_epoch" ]; then
              echo "::warning::$full was pushed to on $pushed (within the last 7 days) вЂ” verify it is really abandoned before archiving."
              echo "- вљ пёЏ Pushed within the last 7 days ($pushed)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          if [ "$has_pages" = "true" ]; then
            echo "::warning::$full has GitHub Pages enabled вЂ” a live site may still depend on it."
            echo "- вљ пёЏ GitHub Pages is enabled." >> "$GITHUB_STEP_SUMMARY"
          fi

          set +e
          open_titles=$(gh issue list --repo "$THIS_REPO" --state open --search "$name" --json number,title --jq '.[] | "#\(.number) \(.title)"' 2>&1)
          list_rc=$?
          set -e
          if [ $list_rc -ne 0 ]; then
            echo "::warning::Preflight could not search open issues for '$name' (non-fatal, proceeding). Details: $open_titles"
          elif [ -n "$open_titles" ]; then
            echo "::warning::Open issue(s) in this repo reference '$name' вЂ” verify none of them depends on the target still existing."
            {
              echo "- вљ пёЏ Open issue(s) referencing \`$name\`:"
              while IFS= read -r t; do echo "  - $t"; done <<< "$open_titles"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "вњ… Preflight passed вЂ” proceeding to the gated archive." >> "$GITHUB_STEP_SUMMARY"

  archive:
    runs-on: ubuntu-latest
    needs: preflight
    environment: github-prod
    steps:
      - name: Validate required token
        shell: bash
        run: |
          if [ -z "${{ secrets.CBM_TOKEN }}" ]; then
            echo '::error::CBM_TOKEN secret is not set (environment: github-prod).'
            exit 1
          fi

      - name: Archive repository (guarded)
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }}
          IN_REPO: ${{ inputs.repo }}
          IN_REASON: ${{ inputs.reason }}
          IN_DRY_RUN: ${{ inputs.dry_run }}
          IN_CONFIRM: ${{ inputs.confirm_repo }}
          IN_ISSUE: ${{ inputs.issue_number }}
          THIS_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # --- normalize + validate the repo name ------------------------------------
          repo_raw="${IN_REPO:-}"
          # Accept either "name" or "owner/name"; strip any owner and force our org.
          name="${repo_raw##*/}"
          # Trim leading/trailing whitespace ONLY вЂ” stripping internal whitespace could
          # silently retarget (e.g. "FFC-EX-foo bar" -> "FFC-EX-foobar"); the name regex
          # below rejects internal whitespace instead.
          name="$(printf '%s' "$name" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "$name" ]; then echo '::error::repo is empty.'; exit 1; fi
          if ! printf '%s' "$name" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "::error::Invalid repository name: $name"; exit 1
          fi
          full="$TARGET_ORG/$name"

          # --- hard denylist ---------------------------------------------------------
          for deny in $DENYLIST; do
            if [ "$name" = "$deny" ]; then
              echo "::error::Refusing to archive protected repository '$name' (denylist)."
              exit 1
            fi
          done

          {
            echo "## Archive request"
            echo "- Target: \`$full\`"
            echo "- Reason: ${IN_REASON:-пј€noneпј‰}"
            echo "- Dry run: $IN_DRY_RUN"
          } >> "$GITHUB_STEP_SUMMARY"

          # --- existence + current state (read-only) ---------------------------------
          if ! meta=$(gh api "repos/$full" 2>/dev/null); then
            echo "| Result | \`$full\` not found (nothing to archive) |" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Repository $full does not exist or is not visible to the token."
            exit 0
          fi
          already=$(printf '%s' "$meta" | jq -r '.archived')
          visibility=$(printf '%s' "$meta" | jq -r '.visibility')
          pushed=$(printf '%s' "$meta" | jq -r '.pushed_at')
          echo "- Current state: archived=$already, visibility=$visibility, last push=$pushed" >> "$GITHUB_STEP_SUMMARY"

          if [ "$already" = "true" ]; then
            echo "вњ… Already archived вЂ” no change." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # --- dry run stops here ----------------------------------------------------
          if [ "$IN_DRY_RUN" != "false" ]; then
            echo "рџ”Ћ **Dry run** вЂ” would archive \`$full\` (set archived=true). No change made." >> "$GITHUB_STEP_SUMMARY"
            echo "Re-run with dry_run=false and confirm_repo=$name to execute." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # --- typed confirmation for a live archive ---------------------------------
          # Normalize confirm_repo exactly like repo: strip any owner prefix, then trim
          # leading/trailing whitespace only. The repo input accepts "name" or
          # "owner/name", so pasting the same owner-qualified value into both fields is
          # unambiguous intent and must confirm. Internal whitespace still fails the
          # equality check against the regex-validated name.
          confirm="${IN_CONFIRM:-}"
          confirm="${confirm##*/}"
          confirm="$(printf '%s' "$confirm" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ "$confirm" != "$name" ]; then
            echo "::error::confirm_repo ('$confirm') must exactly equal repo ('$name') for a live archive."
            exit 1
          fi

          # --- execute (reversible: archived=true, never delete) ---------------------
          gh api -X PATCH "repos/$full" -F archived=true >/dev/null
          echo "рџ—„пёЏ Archived \`$full\` (repository is now read-only; unarchive from Settings to reverse)." >> "$GITHUB_STEP_SUMMARY"

          # --- optionally close a linked issue in THIS repo --------------------------
          if [ -n "${IN_ISSUE:-}" ]; then
            if printf '%s' "$IN_ISSUE" | grep -qE '^[0-9]+$'; then
              # Best-effort (the archive itself already succeeded), but report honestly:
              # only claim the issue was closed if the close actually succeeded.
              gh issue comment "$IN_ISSUE" --repo "$THIS_REPO" \
                --body "Archived \`$full\` вЂ” ${IN_REASON:-no reason given}. Repo is read-only (reversible). Closing as not planned." ||
                echo "::warning::Failed to comment on issue #$IN_ISSUE."
              if gh issue close "$IN_ISSUE" --repo "$THIS_REPO" --reason "not planned"; then
                echo "- Closed issue #$IN_ISSUE in $THIS_REPO." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "- вљ пёЏ Could not close issue #$IN_ISSUE вЂ” close it manually." >> "$GITHUB_STEP_SUMMARY"
                echo "::warning::Failed to close issue #$IN_ISSUE."
              fi
            else
              echo "::warning::issue_number '$IN_ISSUE' is not numeric; skipped closing an issue."
            fi
          fi
