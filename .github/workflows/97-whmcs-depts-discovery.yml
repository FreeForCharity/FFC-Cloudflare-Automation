name: '97. WHMCS - Support Departments Discovery (temp) [WHMCS]'
run-name: 'WHMCS Support Departments Discovery'

# TEMPORARY: push-triggered read-only discovery of WHMCS support departments
# (workflow_dispatch is unavailable to the automation token; push is). Prints
# department ids to the job log. Remove once captured.

on:
  push:
    branches:
      - claude/whmcs-version-updates-5g2s5s
    paths:
      - '.github/workflows/97-whmcs-depts-discovery.yml'

permissions:
  contents: read

jobs:
  discover:
    runs-on: windows-latest
    environment: whmcs-prod

    steps:
      - uses: actions/checkout@v5

      - name: Validate required WHMCS secrets
        shell: pwsh
        env:
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_SECRET)) {
            throw "Missing secret in environment 'whmcs-prod': ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU"
          }

      - name: Export support departments (read-only)
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://freeforcharity.org/hub/includes/api.php'
          WHMCS_API_IDENTIFIER: 'zbBEpfq5W7RCSImE0NOqoYrqIDGTkBPu'
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
          WHMCS_API_ACCESS_KEY: ${{ secrets.WHMCS_API_ACCESS_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'artifacts/whmcs' | Out-Null
          & pwsh -NoProfile -File .\scripts\whmcs-support-departments-export.ps1 `
            -ApiUrl $env:WHMCS_API_URL `
            -OutputFile 'artifacts/whmcs/whmcs_support_departments.csv' `
            -IgnoreDeptAssignments
          if ($LASTEXITCODE -ne 0) { throw "Departments export failed (exit $LASTEXITCODE)." }
