name: '17. DNS - Bulk Replace A-record IP (All Zones) [CF]'
run-name:
  'Bulk Replace A IP: ${{ inputs.old_ip }} -> ${{ inputs.new_ip }} (dry_run=${{ inputs.dry_run }})'

on:
  workflow_dispatch:
    inputs:
      old_ip:
        description: 'Old IP address (e.g. 204.44.192.77)'
        required: true
        type: string
      new_ip:
        description: 'New IP address (e.g. 216.222.200.253)'
        required: true
        type: string
      dry_run:
        description: 'Dry-run (discover only, no changes). Default: true.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  bulk-replace:
    runs-on: windows-latest
    environment: cloudflare-prod
    steps:
      - uses: actions/checkout@v4

      # F1 refactor: CF tokens from Key Vault at runtime via OIDC.
      - uses: ./.github/actions/cloudflare-tokens-from-kv
        with:
          scope: write
          azure-client-id: ${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Run bulk A-record replacement
        shell: pwsh
        run: |
          $params = @{
            OldIp = '${{ inputs.old_ip }}'
            NewIp = '${{ inputs.new_ip }}'
          }
          if ('${{ inputs.dry_run }}' -eq 'true') { $params.DryRun = $true }
          ./scripts/bulk-replace-a-record-ip.ps1 @params
