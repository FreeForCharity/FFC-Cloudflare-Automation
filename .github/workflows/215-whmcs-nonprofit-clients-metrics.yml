name: '215. WHMCS - Nonprofit Clients Metrics (service evidence, no PII) [WHMCS]'
run-name: 'WHMCS Nonprofit Clients Metrics (service evidence)'

# Revalidation of the client-count metrics: classifies clients by the
# products/services they hold (each service has its own registration date and
# status), instead of the historyless client status flag — and surfaces the
# product catalog so "which clients are nonprofits" is decided from data, not
# assumption. Output is aggregate counts + product/group names only (no client
# names, emails, ids, or domains). Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description:
          'WHMCS API endpoint (e.g., https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      output_file:
        description: 'Output JSON filename'
        required: false
        type: string
        default: 'artifacts/whmcs/whmcs_nonprofit_clients_metrics.json'

permissions:
  contents: read
  id-token: write

jobs:
  nonprofit_clients_metrics:
    runs-on: windows-latest
    environment: whmcs-prod-read

    steps:
      - uses: actions/checkout@v5

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ vars.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Aggregate nonprofit client metrics (read-only, no PII)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = "${{ inputs.output_file }}"

          & pwsh -NoProfile -File .\scripts\whmcs-nonprofit-clients-metrics.ps1 -ApiUrl $env:WHMCS_API_URL -OutputFile $out

          if ($LASTEXITCODE -ne 0) {
            throw "WHMCS nonprofit clients metrics script failed with exit code $LASTEXITCODE. See logs above."
          }

          if (-not (Test-Path $out)) {
            throw "Expected output file not found: $out"
          }

      - name: Upload metrics artifact (aggregate only)
        uses: actions/upload-artifact@v6
        with:
          name: whmcs_nonprofit_clients_metrics
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
