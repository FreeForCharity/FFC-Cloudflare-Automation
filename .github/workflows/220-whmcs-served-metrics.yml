name: '220. WHMCS - Served-Per-Year Metrics (span evidence, no PII) [WHMCS]'
run-name: 'WHMCS Served-Per-Year Metrics'

# "216 v2": FFC's services are free, so billing events undercount service
# delivery. This counts a member as SERVED in year Y when a charity service or
# registered domain was IN FORCE during Y (span from regdate to
# next-due/expiry; Active runs through today), emits org-level (domain-keyed)
# counts with current sites-list-only orgs merged in, keeps the old
# billing-active series for comparison, and shows invoice $0-vs-paid
# composition per year. Aggregate counts only. Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description:
          'WHMCS API endpoint (e.g., https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      charity_gids:
        description: 'Product group ids that mark a client as a nonprofit member'
        required: false
        type: string
        default: '2,5,6,7,8'
      output_file:
        description: 'Output JSON filename'
        required: false
        type: string
        default: 'artifacts/whmcs/whmcs_served_metrics.json'

permissions:
  contents: read
  id-token: write

jobs:
  served_metrics:
    runs-on: windows-latest
    environment: whmcs-prod

    steps:
      - uses: actions/checkout@v5

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          azure-client-id: ${{ vars.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Build served-per-year matrix (read-only, no PII)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = "${{ inputs.output_file }}"

          & pwsh -NoProfile -File .\scripts\whmcs-served-metrics.ps1 -ApiUrl $env:WHMCS_API_URL -OutputFile $out -CharityGids '${{ inputs.charity_gids }}'

          if ($LASTEXITCODE -ne 0) {
            throw "WHMCS served metrics script failed with exit code $LASTEXITCODE. See logs above."
          }

          if (-not (Test-Path $out)) {
            throw "Expected output file not found: $out"
          }

      - name: Upload metrics artifact (aggregate only)
        uses: actions/upload-artifact@v6
        with:
          name: whmcs_served_metrics
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
