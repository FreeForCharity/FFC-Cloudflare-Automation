name: '09. DNS - Create Zone (Admin) [CF]'
run-name: 'Create Zone: ${{ inputs.domain }} (${{ inputs.account }})'

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name to add as a Cloudflare zone (e.g., example.org)'
        required: true
        type: string
      account:
        description:
          'Which Cloudflare account should own this zone? (required to prevent duplicates)'
        required: true
        type: choice
        options:
          - FFC
          - CM
      zone_type:
        description: 'Zone type'
        required: true
        type: choice
        options:
          - full
          - partial
        default: full
      jump_start:
        description: 'Attempt to auto-import DNS records from existing nameservers'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  create-zone:
    runs-on: ubuntu-latest
    environment: cloudflare-prod-write

    steps:
      - uses: actions/checkout@v5

      # F1 refactor: CF tokens from Key Vault at runtime via OIDC.
      - uses: ./.github/actions/cloudflare-tokens-from-kv
        with:
          scope: write
          azure-client-id: ${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Create zone
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ('${{ inputs.jump_start }}' -eq 'true') {
            pwsh -NoProfile -File scripts/cloudflare-zone-create.ps1 `
              -Domain "${{ inputs.domain }}" `
              -Account "${{ inputs.account }}" `
              -ZoneType "${{ inputs.zone_type }}" `
              -JumpStart
          }
          else {
            pwsh -NoProfile -File scripts/cloudflare-zone-create.ps1 `
              -Domain "${{ inputs.domain }}" `
              -Account "${{ inputs.account }}" `
              -ZoneType "${{ inputs.zone_type }}"
          }
