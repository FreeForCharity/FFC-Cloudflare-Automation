name: '08. DNS - Export Cloudflare Zones (Report) [CF]'
run-name: 'Export Domain Summary'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  export_summary:
    runs-on: windows-latest
    environment: cloudflare-prod-read
    steps:
      - uses: actions/checkout@v5

      # F1 refactor: CF tokens from Key Vault at runtime via OIDC.
      - uses: ./.github/actions/cloudflare-tokens-from-kv
        with:
          scope: read
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Run DNS Export (FFC)
        shell: pwsh
        run: |
          .\Export-CloudflareDns.ps1 -Token $env:CLOUDFLARE_API_TOKEN_FFC -OutputFile "domain_summary_ffc.csv"

      - name: Run DNS Export (CM)
        shell: pwsh
        run: |
          .\Export-CloudflareDns.ps1 -Token $env:CLOUDFLARE_API_TOKEN_CM -OutputFile "domain_summary_cm.csv"

      - name: Merge exports
        shell: pwsh
        run: |
          $files = @('domain_summary_ffc.csv', 'domain_summary_cm.csv') | Where-Object { Test-Path $_ }
          if ($files.Count -eq 0) { throw 'No export files were generated; cannot produce combined domain_summary.csv.' }

          $rows = foreach ($f in $files) { Import-Csv $f }
          $seen = @{}
          $merged = foreach ($r in $rows) {
            if (-not $r.zone) { continue }
            $key = $r.zone.ToString().ToLowerInvariant()
            if (-not $seen.ContainsKey($key)) {
              $seen[$key] = $true
              $r
            }
          }

          $merged | Sort-Object zone | Export-Csv -Path 'domain_summary.csv' -NoTypeInformation -Encoding utf8
          Write-Host "Merged $($merged.Count) unique zones into domain_summary.csv"

      - name: Upload CSV Artifact
        uses: actions/upload-artifact@v6
        with:
          name: domain_summary
          path: domain_summary.csv
