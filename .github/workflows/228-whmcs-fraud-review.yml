name: '228. WHMCS - Fraud Review (FraudLabs Pro) [FRAUDLABS+WHMCS]'
run-name: 'WHMCS Fraud Review (FraudLabs Pro)'

# Read-only against external systems: for each WHMCS Fraud-status order, reads its stored FraudLabs
# Pro verdict and emits a triage row with a RECOMMENDED action (clear-recommended / hold-for-human /
# review-manually). It performs NO WHMCS/order writes — clearing a false positive is a separate,
# gated action via workflow 211. The scheduled run additionally writes a rolling GitHub tracking
# issue (issues:write, ambient token) listing the current Fraud queue, self-closing when it clears
# (the tracking_issue job below). See issue #813.
#
# Scaffolding is inert until provisioned (docs/fraudlabspro-api.md): the FraudLabs Pro key must be
# loaded into Key Vault as 'read-all-ffc-fraudlabspro-api-key' and the 'fraudlabspro-prod-read'
# environment + federated credential created. Until then the review job fails fast with a clear
# message, exactly like the Candid scaffolding (801/802).

on:
  # Daily automated fraud check (issue #813 item 2): weekday mid-morning, aligned with the 209/210
  # triage crons (distinct minute so read-only sweeps never stack). The scheduled run performs the
  # same read-only review and then upserts ONE rolling tracking issue listing the current
  # Fraud-status orders + their FraudLabs verdicts (self-closing when the queue is clear). While the
  # FraudLabs Pro key is un-provisioned the review job fails fast (scaffold-inert), so the tracking
  # job — which `needs` it — is skipped: no tracking issue is opened until 228 is live.
  schedule:
    - cron: '27 13 * * 1-5'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'WHMCS API endpoint (orders read)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      order_id_field:
        description: 'WHMCS order field sent to FraudLabs Pro as the order id (ordernum or id)'
        required: false
        type: string
        default: 'ordernum'
      dry_run:
        description: 'Read-only review (228 never writes; live clearing is done via workflow 211)'
        required: false
        type: boolean
        default: true

# Latest run wins: a newer dispatched run cancels an earlier one still queued, so read-only reviews
# never stack up (mirrors 210).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  fetch_fraud_orders:
    runs-on: windows-latest
    environment: whmcs-prod-read

    steps:
      - uses: actions/checkout@v7.0.1

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ vars.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Export Fraud-status orders (read-only)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_URL)) {
            $env:WHMCS_API_URL = 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
          }
          New-Item -ItemType Directory -Force -Path artifacts/whmcs | Out-Null
          & pwsh -NoProfile -File .\scripts\whmcs-orders-export.ps1 -ApiUrl $env:WHMCS_API_URL -Status 'Fraud' -OutputFile artifacts/whmcs/orders_Fraud.csv
          if ($LASTEXITCODE -ne 0) { throw "Fraud orders export failed (exit $LASTEXITCODE)." }
          if (-not (Test-Path artifacts/whmcs/orders_Fraud.csv)) {
            # No Fraud orders → hand the review job a truly empty (0-byte) file so its Import-Csv
            # yields zero rows (a blank-line file has no header) and it reports a clear queue.
            New-Item -ItemType File -Force -Path artifacts/whmcs/orders_Fraud.csv | Out-Null
          }

      - name: Upload Fraud orders artifact
        uses: actions/upload-artifact@v7
        with:
          name: fraud-orders
          path: artifacts/whmcs/orders_Fraud.csv
          if-no-files-found: warn

  fraud_review:
    needs: fetch_fraud_orders
    runs-on: windows-latest
    environment: fraudlabspro-prod-read

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Validate required Azure secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_KV_CLIENT_ID secret is not set (environment: fraudlabspro-prod-read); see docs/fraudlabspro-api.md";
            exit 1;
          fi
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_TENANT_ID secret is not set (environment: fraudlabspro-prod-read); see docs/fraudlabspro-api.md";
            exit 1;
          fi

      - name: Download Fraud orders artifact
        uses: actions/download-artifact@v8
        with:
          name: fraud-orders
          path: artifacts/whmcs

      # FraudLabs Pro key from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/fraudlabspro-keys-from-kv
        with:
          scope: read
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: FraudLabs Pro review (read-only)
        shell: pwsh
        env:
          INPUT_ORDER_ID_FIELD: ${{ inputs.order_id_field }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:INPUT_DRY_RUN -ne 'true') {
            Write-Host "::notice::228 performs a read-only review only; clear approved false positives via workflow 211 (gated on whmcs-prod)."
          }
          $field = $env:INPUT_ORDER_ID_FIELD
          if ([string]::IsNullOrWhiteSpace($field)) { $field = 'ordernum' }
          & pwsh -NoProfile -File .\scripts\whmcs-fraud-review.ps1 `
            -OrdersCsv artifacts/whmcs/orders_Fraud.csv `
            -OutputFile artifacts/whmcs/fraud_review.csv `
            -SummaryFile $env:GITHUB_STEP_SUMMARY `
            -OrderIdField $field
          if ($LASTEXITCODE -ne 0) { throw "Fraud review failed (exit $LASTEXITCODE)." }

      - name: Upload Fraud review artifact
        uses: actions/upload-artifact@v7
        with:
          name: whmcs_fraud_review
          path: artifacts/whmcs/fraud_review.csv
          if-no-files-found: warn
          retention-days: 30

  # Daily rolling tracking issue (issue #813 item 2). Only on the scheduled run — a manual dispatch
  # stays a pure review (artifact + step summary) and never mutates the tracking issue. Mirrors the
  # 732 rolling-issue state machine: upsert ONE issue while Fraud orders remain, auto-close it on the
  # first scheduled run that finds the queue clear. Ambient GITHUB_TOKEN, hub-only (no gate).
  tracking_issue:
    needs: fraud_review
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Download Fraud review artifact
        uses: actions/download-artifact@v8
        with:
          name: whmcs_fraud_review
          path: artifacts/whmcs

      - name: Load review summary into env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $csv = 'artifacts/whmcs/fraud_review.csv'
          $rows = @()
          if ((Test-Path $csv) -and (Get-Item $csv).Length -gt 0) {
            $rows = @(Import-Csv -Path $csv)
          }
          # PII stays masked: whmcs-fraud-review.ps1 already wrote `name` as an initial-only mask,
          # and only the review columns are forwarded (no raw email/address reaches the issue).
          $json = $rows |
            Select-Object ordernum, userid, name, amount, whmcs_status, fraudlabs_status, fraudlabs_score, recommendation |
            ConvertTo-Json -Compress -AsArray
          if ([string]::IsNullOrWhiteSpace($json)) { $json = '[]' }
          "FRAUD_REVIEW_JSON<<FRAUD_EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $json | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "FRAUD_EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upsert or close rolling Fraud tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const marker = '<!-- whmcs-fraud-review-tracking -->';
            const title = 'WHMCS orders held in Fraud status (FraudLabs Pro review)';
            let rows = [];
            try {
              rows = JSON.parse(process.env.FRAUD_REVIEW_JSON || '[]');
            } catch (e) {
              core.warning(`could not parse FRAUD_REVIEW_JSON: ${e}`);
              rows = [];
            }
            if (!Array.isArray(rows)) rows = [];

            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'agentic-os,whmcs', per_page: 50,
            });
            const existing = open.find((i) => i.body && i.body.includes(marker));
            const now = new Date().toISOString();

            // Empty queue → nothing to track. Close the rolling issue if one is open.
            if (rows.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `✅ ${now} — no WHMCS orders remain in Fraud status. Auto-closing.`,
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number, state: 'closed',
                });
              }
              return;
            }

            // Build a masked table of the current Fraud queue.
            const cell = (v) => String(v == null ? '' : v).replace(/\|/g, '\\|');
            const clear = rows.filter((r) => (r.recommendation || '') === 'clear-recommended').length;
            const lines = [
              `Reviewed **${rows.length}** WHMCS order(s) held in **Fraud** status; **${clear}** recommended for clearing (via workflow 211, gated on \`whmcs-prod\`).`,
              '',
              '| order | client | name | amount | WHMCS | FraudLabs | score | recommendation |',
              '| --- | --- | --- | --- | --- | --- | --- | --- |',
            ];
            for (const r of rows) {
              lines.push(
                `| ${cell(r.ordernum)} | ${cell(r.userid)} | ${cell(r.name)} | ${cell(r.amount)} | ${cell(r.whmcs_status)} | ${cell(r.fraudlabs_status)} | ${cell(r.fraudlabs_score)} | ${cell(r.recommendation)} |`,
              );
            }
            const table = lines.join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number,
                body: `### ${now} — Fraud queue refresh\n\n${table}`,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, labels: ['agentic-os', 'whmcs'],
                body: `${marker}\nWHMCS orders currently held in **Fraud** status, with their FraudLabs Pro verdicts. This rolling issue auto-closes on the first scheduled run that finds the queue clear.\n\n${table}\n\n_Managed by 228. WHMCS - Fraud Review (FraudLabs Pro). Clearing a false positive is a separate, gated action via workflow 211._`,
              });
            }
