name: '99. Bootstrap - Set Azure OIDC repo Variables (Admin) [one-shot]'
run-name: 'Bootstrap Azure OIDC repo Variables'

# One-shot bootstrap: creates the repository-level Variables that the WHMCS (and
# future Cloudflare/M365) Key Vault actions read for OIDC. It runs on a GitHub
# runner (which has direct GitHub API access), authenticates to Azure via OIDC
# with the writer identity, pulls the admin PAT from Key Vault, and sets the two
# Variables. Triggered by pushing this file. Safe to delete after it has run once.

on:
  push:
    branches:
      - claude/whmcs-automation-az-kv-bu1rmo
    paths:
      - '.github/workflows/99-bootstrap-azure-repo-vars.yml'

permissions:
  contents: read
  id-token: write

jobs:
  set_repo_variables:
    runs-on: ubuntu-latest
    environment: whmcs-prod
    env:
      # Non-secret Azure identifiers (ffc-admin-kv-writer client id + tenant id).
      # Used both to authenticate (OIDC) and as the values written to the repo Variables.
      AZURE_CLIENT_ID: 'd42c3d6a-8fe9-4ac7-a776-74bac8a19642'
      AZURE_TENANT_ID: '80c64bf2-fa5b-425c-9a5a-1fcf282d3274'

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Set repository Variables from the admin PAT in Key Vault
        shell: bash
        run: |
          set -euo pipefail

          # Pull the admin PAT from Key Vault and mask it before any use.
          PAT="$(az keyvault secret show --vault-name kv-ffc-admin-prod-cbm \
            --name wr-all-cbm-github-pat --query value -o tsv)"
          if [ -z "$PAT" ]; then
            echo "::error::Key Vault returned an empty admin PAT (wr-all-cbm-github-pat)."
            exit 1
          fi
          echo "::add-mask::$PAT"
          export GH_TOKEN="$PAT"

          gh variable set WR_ALL_FFC_AZURE_KV_CLIENT_ID \
            --repo "$GITHUB_REPOSITORY" --body "$AZURE_CLIENT_ID"
          gh variable set WR_ALL_FFC_AZURE_TENANT_ID \
            --repo "$GITHUB_REPOSITORY" --body "$AZURE_TENANT_ID"

          echo "## Repository Variables set" >> "$GITHUB_STEP_SUMMARY"
          gh variable list --repo "$GITHUB_REPOSITORY" >> "$GITHUB_STEP_SUMMARY"
