name: '10. Domain - Purchase via Cloudflare Registrar API (Admin) [CF]'
run-name: 'Purchase Domain: ${{ inputs.domain }}'

on:
  issues:
    types: [labeled]

  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain name to purchase (e.g., example.org)'
        required: true
        type: string
      registrant_name:
        description: 'Registrant full name (leave blank to use account default contact)'
        required: false
        type: string
      registrant_org:
        description: 'Registrant organization (leave blank to use account default contact)'
        required: false
        type: string
      registrant_email:
        description: 'Registrant email (leave blank to use account default contact)'
        required: false
        type: string
      registrant_phone:
        description:
          'Registrant phone with country code, e.g. +1.5205551234 (leave blank to use account
          default contact)'
        required: false
        type: string
      registrant_address:
        description: 'Street address (leave blank to use account default contact)'
        required: false
        type: string
      registrant_city:
        description: 'City (leave blank to use account default contact)'
        required: false
        type: string
      registrant_state:
        description: 'State/Province (leave blank to use account default contact)'
        required: false
        type: string
      registrant_postal_code:
        description: 'Postal/ZIP code (leave blank to use account default contact)'
        required: false
        type: string
      registrant_country:
        description: 'Country code (default: US)'
        required: false
        type: string
        default: 'US'
      dry_run:
        description: 'Dry run: check availability only, do not purchase'
        required: false
        type: boolean
        default: true
      issue_number:
        description: 'Issue number to post results back to (optional)'
        required: false
        type: number

permissions:
  contents: read
  issues: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      domain: ${{ steps.parse.outputs.domain }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      post_comments: ${{ steps.parse.outputs.post_comments }}

    steps:
      - name: Gate on label (issues trigger only)
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "labeled" ]; then
            label="${{ github.event.label.name }}"
            if [ "$label" != "domain-purchase-approved" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - name: Parse inputs (issue or workflow_dispatch)
        id: parse
        if: steps.gate.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;

            if (eventName === 'labeled') {
              const issue = context.payload.issue;
              const issueNumber = issue.number;
              const body = issue.body || '';

              // Extract domain from issue body (### Domain Name section).
              const domainMatch = body.match(/###\s*Domain Name\s*\n+([^\n#]+)/i);
              const domain = domainMatch ? domainMatch[1].trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/$/, '') : '';

              if (!domain) {
                core.setFailed(`Could not parse domain from issue #${issueNumber}.`);
                return;
              }

              core.setOutput('domain', domain);
              core.setOutput('issue_number', String(issueNumber));
              core.setOutput('post_comments', 'true');
            } else {
              const domain = '${{ inputs.domain }}'.trim().toLowerCase().replace(/\.$/, '');
              const issueNumber = '${{ inputs.issue_number }}';
              core.setOutput('domain', domain);
              core.setOutput('issue_number', issueNumber || '');
              core.setOutput('post_comments', issueNumber ? 'true' : 'false');
            }

  check_and_purchase:
    runs-on: ubuntu-latest
    environment: cloudflare-registrar
    needs: [resolve]
    if: needs.resolve.outputs.skip != 'true'
    outputs:
      domain: ${{ steps.run.outputs.domain }}
      registrable: ${{ steps.run.outputs.registrable }}
      price: ${{ steps.run.outputs.price }}
      registered: ${{ steps.run.outputs.registered }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_REGISTRAR_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_REGISTRAR_API_TOKEN secret is not set (environment: cloudflare-registrar)."
            echo "::error::Create an API token at https://dash.cloudflare.com/<ACCOUNT_ID>/api-tokens with Registrar:Write permission."
            exit 1
          fi
          if [ -z "${{ vars.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID variable is not set (environment: cloudflare-registrar)."
            exit 1
          fi

      - name: Check availability and purchase domain
        id: run
        shell: pwsh
        env:
          CLOUDFLARE_REGISTRAR_API_TOKEN: ${{ secrets.CLOUDFLARE_REGISTRAR_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          $domain = "${{ needs.resolve.outputs.domain }}"
          $dryRun = '${{ inputs.dry_run }}' -eq 'true'

          $scriptArgs = @(
            '-Domain', $domain
          )

          if ($dryRun) { $scriptArgs += '-DryRun' }

          if ('${{ inputs.registrant_name }}') { $scriptArgs += '-RegistrantName'; $scriptArgs += '${{ inputs.registrant_name }}' }
          if ('${{ inputs.registrant_org }}') { $scriptArgs += '-RegistrantOrg'; $scriptArgs += '${{ inputs.registrant_org }}' }
          if ('${{ inputs.registrant_email }}') { $scriptArgs += '-RegistrantEmail'; $scriptArgs += '${{ inputs.registrant_email }}' }
          if ('${{ inputs.registrant_phone }}') { $scriptArgs += '-RegistrantPhone'; $scriptArgs += '${{ inputs.registrant_phone }}' }
          if ('${{ inputs.registrant_address }}') { $scriptArgs += '-RegistrantAddress'; $scriptArgs += '${{ inputs.registrant_address }}' }
          if ('${{ inputs.registrant_city }}') { $scriptArgs += '-RegistrantCity'; $scriptArgs += '${{ inputs.registrant_city }}' }
          if ('${{ inputs.registrant_state }}') { $scriptArgs += '-RegistrantState'; $scriptArgs += '${{ inputs.registrant_state }}' }
          if ('${{ inputs.registrant_postal_code }}') { $scriptArgs += '-RegistrantPostalCode'; $scriptArgs += '${{ inputs.registrant_postal_code }}' }
          if ('${{ inputs.registrant_country }}') { $scriptArgs += '-RegistrantCountry'; $scriptArgs += '${{ inputs.registrant_country }}' }

          $jsonOut = & pwsh -NoProfile -File scripts/cloudflare-domain-register.ps1 @scriptArgs
          if ($LASTEXITCODE -ne 0) { throw "cloudflare-domain-register.ps1 failed (exit $LASTEXITCODE)." }

          $r = $jsonOut | ConvertFrom-Json -ErrorAction Stop

          "domain=$($r.domain)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "registrable=$($r.registrable)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "registered=$($r.registered)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $price = ''
          if ($r.pricing -and $r.pricing.registration_cost) {
            $price = "$($r.pricing.registration_cost) $($r.pricing.currency)"
          }
          "price=$price" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $outDir = Join-Path $env:RUNNER_TEMP 'domain-purchase'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $jsonOut | Out-File -FilePath (Join-Path $outDir 'result.json') -Encoding utf8
          "out_dir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload purchase result artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-purchase-result
          path: ${{ steps.run.outputs.out_dir }}/result.json
          if-no-files-found: error

  post_back:
    runs-on: ubuntu-latest
    needs: [resolve, check_and_purchase]
    if: needs.resolve.outputs.post_comments == 'true' && needs.resolve.outputs.issue_number != ''

    steps:
      - name: Download purchase result artifact
        uses: actions/download-artifact@v4
        with:
          name: domain-purchase-result
          path: artifacts/domain-purchase

      - name: Comment results back to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issueNumber = Number('${{ needs.resolve.outputs.issue_number }}');
            const domain = '${{ needs.check_and_purchase.outputs.domain }}';
            const registrable = '${{ needs.check_and_purchase.outputs.registrable }}';
            const price = '${{ needs.check_and_purchase.outputs.price }}';
            const registered = '${{ needs.check_and_purchase.outputs.registered }}';
            const dryRun = '${{ inputs.dry_run }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const raw = fs.readFileSync('artifacts/domain-purchase/result.json', 'utf8');

            let statusLine;
            if (registered === 'true') {
              statusLine = `✅ **${domain}** has been **purchased** via Cloudflare Registrar API.`;
            } else if (registrable === 'true' && dryRun) {
              statusLine = `🔍 **${domain}** is **available** (dry run — not purchased). Price: **${price || 'see details'}**.`;
            } else {
              statusLine = `❌ **${domain}** is **not available** for purchase via Cloudflare Registrar API.`;
            }

            const body = [
              `## Domain Purchase Workflow — ${domain}`,
              '',
              statusLine,
              '',
              `- Mode: **${dryRun ? 'DRY RUN (check only)' : 'LIVE'}**`,
              `- Available: **${registrable}**`,
              price ? `- Price: **${price}**` : '',
              `- Purchased: **${registered}**`,
              `- Run: ${runUrl}`,
              '',
              '<details><summary>Full API result (JSON)</summary>\n\n```json\n' + raw.trim() + '\n```\n</details>',
            ].filter(l => l !== null).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
