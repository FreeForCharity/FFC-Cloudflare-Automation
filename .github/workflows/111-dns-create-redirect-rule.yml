name: '111. DNS - Create Redirect Rule (Admin) [CF]'
run-name: 'Redirect Rule: ${{ inputs.source_domain }} → ${{ inputs.target_domain }}'

on:
  workflow_dispatch:
    inputs:
      source_domain:
        description: 'Source domain (the zone that will redirect) e.g. ffcsites.org'
        required: true
        type: string
      target_domain:
        description: 'Target domain (where traffic should land) e.g. ffcadmin.org'
        required: true
        type: string
      status_code:
        description: 'HTTP redirect status code'
        type: choice
        options:
          - '301'
          - '302'
          - '307'
          - '308'
        default: '301'
      include_www:
        description: 'Also redirect www.<source> (in addition to apex)'
        type: boolean
        default: true
      preserve_query_string:
        description: 'Forward query string through to target'
        type: boolean
        default: true
      dry_run:
        description: 'Dry Run (preview the rule payload, no changes applied)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: cloudflare-prod-read
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/cloudflare-tokens-from-kv
        with:
          scope: read
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Preview redirect rule (always runs)
        shell: pwsh
        env:
          INPUT_SOURCE: ${{ inputs.source_domain }}
          INPUT_TARGET: ${{ inputs.target_domain }}
          INPUT_STATUS: ${{ inputs.status_code }}
          INPUT_INCLUDE_WWW: ${{ inputs.include_www }}
          INPUT_PRESERVE_QS: ${{ inputs.preserve_query_string }}
        run: |
          $args = @(
            '-SourceDomain', $env:INPUT_SOURCE,
            '-TargetDomain', $env:INPUT_TARGET,
            '-StatusCode',   [int]$env:INPUT_STATUS,
            '-DryRun'
          )
          if ($env:INPUT_INCLUDE_WWW -ne 'true') { $args += '-ApexOnly' }
          if ($env:INPUT_PRESERVE_QS  -ne 'true') { $args += '-NoPreserveQueryString' }
          pwsh -NoProfile -File scripts/Set-CloudflareRedirectRule.ps1 @args

  apply:
    needs: preview
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    environment: cloudflare-prod-write
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/cloudflare-tokens-from-kv
        with:
          scope: write
          azure-client-id: ${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Apply redirect rule
        shell: pwsh
        env:
          INPUT_SOURCE: ${{ inputs.source_domain }}
          INPUT_TARGET: ${{ inputs.target_domain }}
          INPUT_STATUS: ${{ inputs.status_code }}
          INPUT_INCLUDE_WWW: ${{ inputs.include_www }}
          INPUT_PRESERVE_QS: ${{ inputs.preserve_query_string }}
        run: |
          $args = @(
            '-SourceDomain', $env:INPUT_SOURCE,
            '-TargetDomain', $env:INPUT_TARGET,
            '-StatusCode',   [int]$env:INPUT_STATUS
          )
          if ($env:INPUT_INCLUDE_WWW -ne 'true') { $args += '-ApexOnly' }
          if ($env:INPUT_PRESERVE_QS  -ne 'true') { $args += '-NoPreserveQueryString' }
          pwsh -NoProfile -File scripts/Set-CloudflareRedirectRule.ps1 @args

      - name: Smoke test
        shell: pwsh
        env:
          INPUT_SOURCE: ${{ inputs.source_domain }}
          INPUT_TARGET: ${{ inputs.target_domain }}
          INPUT_STATUS: ${{ inputs.status_code }}
        run: |
          $src = $env:INPUT_SOURCE
          $tgt = $env:INPUT_TARGET
          $expected = [int]$env:INPUT_STATUS
          Write-Host "Probing https://$src ..."
          # Sleep briefly to let CF propagate the rule
          Start-Sleep -Seconds 5
          # Use curl over Invoke-WebRequest: PS7's Invoke-WebRequest throws on 3xx with
          # -MaximumRedirection 0 instead of returning the response, even with -SkipHttpErrorCheck.
          $raw = (curl.exe -sS -o /dev/null -w "status=%{http_code}`nlocation=%{redirect_url}`n" --max-time 30 "https://$src") -join "`n"
          $status = ([regex]::Match($raw, 'status=(\d+)').Groups[1].Value) -as [int]
          $location = ([regex]::Match($raw, 'location=(\S*)').Groups[1].Value).Trim()
          Write-Host "  status:   $status"
          Write-Host "  location: $location"
          if ($status -ne $expected) {
            Write-Warning "Expected HTTP $expected, got $status. Cloudflare may still be propagating; retry the smoke test in a minute."
            exit 0
          }
          if ($location -notlike "https://$tgt*") {
            Write-Warning "Location header does not start with https://$tgt (got: $location)."
            exit 0
          }
          Write-Host "OK: redirect verified." -ForegroundColor Green
