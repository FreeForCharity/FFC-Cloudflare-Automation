name: '502. Google - Analytics Report (GA4 -> JSON) [GOOGLE]'
run-name: 'Google Analytics Report'

# Read-only GA4 reporting for the FFC primary sites. Generates aggregate JSON per site and delivers
# it to FreeForCharity/FFC-IN-ffcadmin.org as a reviewable PR (never a direct push). PII-safe:
# aggregate metrics only. Requires the google-prod-read environment (report) and the approval-gated
# github-prod environment (delivery, CBM_TOKEN) + the Wave 0 foundation.

on:
  schedule:
    - cron: '17 7 * * *' # daily 07:17 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window in days'
        required: false
        default: '28'
        type: string

# Supersede-on-newer (#722): these daily runs pause at an approval gate; without
# this, unapproved runs pile up ~12-deep until the janitor reaps them at 7 days.
# cancel-in-progress cancels the older queued/waiting run the moment the next
# scheduled run starts, so at most ONE run ever waits at the gate. Ref-scoped
# so a dispatch from a PR branch can never cancel main's scheduled run.
# Trade-off (accepted): cancel-in-progress could interrupt an EXECUTING run,
# but execution lasts minutes against a 24h cadence — in practice only
# gate-waiting runs are ever superseded; janitor 734 remains the backstop.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-supersede
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # Fail-closed connectivity gate: prove OIDC -> KV -> GA4 before generating any report.
  smoke:
    uses: ./.github/workflows/501-google-api-smoke.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  report:
    needs: smoke
    runs-on: windows-latest
    environment: google-prod-read
    steps:
      - uses: actions/checkout@v7

      - name: Validate required Azure secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_KV_CLIENT_ID is not set (environment: google-prod-read)"; exit 1;
          fi
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_TENANT_ID is not set (environment: google-prod-read)"; exit 1;
          fi

      - uses: ./.github/actions/google-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Seed time-series history from ffcadmin (public repo, no auth)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:GITHUB_WORKSPACE 'ga-out'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          foreach ($site in @('freeforcharity.org', 'ffcadmin.org')) {
            $url = "https://raw.githubusercontent.com/FreeForCharity/FFC-IN-ffcadmin.org/main/public/data/google-analytics/$site.timeseries.json"
            try {
              Invoke-WebRequest -Uri $url -OutFile (Join-Path $out "$site.timeseries.json") -ErrorAction Stop
              Write-Host "Seeded history for $site"
            } catch {
              Write-Host "No existing history for $site (first run) - starting fresh"
            }
          }

      - name: Generate GA reports (both primary sites)
        shell: pwsh
        env:
          DAYS: ${{ inputs.days != '' && inputs.days || '28' }}
          FFC_PROP: ${{ vars.GA_PROPERTY_ID_PRIMARY }}
          ADMIN_PROP: ${{ vars.GA_PROPERTY_ID_FFCADMIN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:GITHUB_WORKSPACE 'ga-out'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $days = [int]$env:DAYS
          if (-not $env:FFC_PROP) { throw 'vars.GA_PROPERTY_ID_PRIMARY is not set.' }
          & pwsh -NoProfile -File scripts/google-analytics-report.ps1 -SiteLabel 'freeforcharity.org' -PropertyId $env:FFC_PROP -Days $days -Hostname 'freeforcharity.org' -OutPath (Join-Path $out 'freeforcharity.org.json')
          if ($env:ADMIN_PROP) {
            & pwsh -NoProfile -File scripts/google-analytics-report.ps1 -SiteLabel 'ffcadmin.org' -PropertyId $env:ADMIN_PROP -Days $days -Hostname 'ffcadmin.org' -OutPath (Join-Path $out 'ffcadmin.org.json')
          } else {
            Write-Host '::warning::vars.GA_PROPERTY_ID_FFCADMIN not set; skipping ffcadmin.org'
          }

      - uses: actions/upload-artifact@v7
        with:
          name: ga-reports
          path: ga-out/*.json
          if-no-files-found: error

  deliver:
    needs: report
    runs-on: ubuntu-latest
    environment: github-prod
    steps:
      # Checkout gives the deliver job the current workflow catalog so the public
      # copies on ffcadmin (src/data render + /data stable URL) refresh in the
      # same daily PR as the GA data — one reviewable sync pipe (backlog #554).
      - uses: actions/checkout@v7

      - name: Download reports
        uses: actions/download-artifact@v8
        with:
          name: ga-reports
          path: ga-out

      # Generate the Agentic OS status feed (backlog #723) so it rides the same
      # daily sync PR as the GA data + workflow catalog — one reviewable pipe,
      # no new gate. REST-only, PII-safe aggregates; CBM_TOKEN just reads.
      - name: Generate Agentic OS status feed
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/generate-agentic-os-status.py --output agentic-os-status.json

      - name: Open/update daily data-sync PR into FFC-IN-ffcadmin.org
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name 'ffc-automation[bot]'
          git config --global user.email 'automation@freeforcharity.org'
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/FreeForCharity/FFC-IN-ffcadmin.org.git" target
          cd target
          # True idempotency: base on the existing sync branch when it exists, so a re-run
          # with identical content produces no new commit and no PR churn.
          if git fetch origin chore/ga-data-sync --depth 1 2>/dev/null; then
            # Shallow single-branch clone: the fetch lands only in FETCH_HEAD —
            # no origin/chore/ga-data-sync tracking ref is created.
            git checkout -B chore/ga-data-sync FETCH_HEAD
          else
            git checkout -B chore/ga-data-sync
          fi
          mkdir -p public/data/google-analytics src/data public/data
          cp ../ga-out/*.json public/data/google-analytics/
          cp ../docs/workflow-catalog.json src/data/workflow-catalog.json
          cp ../docs/workflow-catalog.json public/data/workflow-catalog.json
          # Agentic OS status feed for the /agentic-os page (src render + stable /data URL).
          cp ../agentic-os-status.json src/data/agentic-os-status.json
          cp ../agentic-os-status.json public/data/agentic-os-status.json
          git add public/data src/data/workflow-catalog.json src/data/agentic-os-status.json
          if git diff --cached --quiet; then echo 'No data changes vs the sync branch; skipping.'; exit 0; fi
          git commit -m "chore(data): daily sync — GA metrics + time-series + workflow catalog + agentic-os status ($(date -u +%F))"
          git push origin chore/ga-data-sync
          # Only skip creation when an OPEN PR already exists for the branch.
          # `gh pr view <branch>` resolves the most recent PR in ANY state, so
          # after the first sync PR merges (branch left undeleted) it matches the
          # merged PR and the daily PR is never opened again (#737). List by
          # head + open-state instead, which returns nothing once the prior PR
          # has merged.
          if [ -z "$(gh pr list --repo FreeForCharity/FFC-IN-ffcadmin.org --head chore/ga-data-sync --state open --json number --jq '.[].number')" ]; then
            gh pr create --repo FreeForCharity/FFC-IN-ffcadmin.org --base main --head chore/ga-data-sync \
              --title 'chore(data): daily data sync (GA + workflow catalog + agentic-os status)' \
              --body 'Automated daily sync from FFC-Cloudflare-Automation (502): GA4 aggregate metrics + time-series for the primary sites, the generated workflow catalog for /automation + the stable /data URL, and the Agentic OS status feed for /agentic-os. PII-safe aggregates only.'
          fi
          # Best-effort auto-merge so the daily PR lands once ffcadmin checks pass
          # (no-op when auto-merge is unavailable on the repo).
          gh pr merge chore/ga-data-sync --repo FreeForCharity/FFC-IN-ffcadmin.org --merge --auto \
            || echo 'auto-merge unavailable; PR awaits manual merge'
