name: 'Google - API Smoke (GA4 connectivity)'
run-name: 'Google API Smoke: property ${{ inputs.property_id }}'

# Proves the full OIDC -> Azure Key Vault -> Google chain end to end before any real reporting runs.
# Read-only: a 1-day activeUsers report. Fails closed if credentials are missing or the API errors.
# Reusable via workflow_call so reporting workflows can require it as a gate.

on:
  workflow_dispatch:
    inputs:
      property_id:
        description: 'GA4 numeric property id (e.g. 123456789). Falls back to vars.GA_PROPERTY_ID_PRIMARY.'
        required: false
        type: string
  workflow_call:
    inputs:
      property_id:
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    runs-on: windows-latest
    environment: google-prod-read

    steps:
      - uses: actions/checkout@v5

      - name: Validate required Azure secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_KV_CLIENT_ID secret is not set (environment: google-prod-read)";
            exit 1;
          fi
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_TENANT_ID secret is not set (environment: google-prod-read)";
            exit 1;
          fi

      # Read-only: scope: read loads the read-all-* Google SA key from Key Vault and exports
      # GOOGLE_APPLICATION_CREDENTIALS (ADC) for the steps below.
      - uses: ./.github/actions/google-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: GA4 Data API connectivity check
        shell: pwsh
        env:
          PROPERTY_ID: ${{ inputs.property_id != '' && inputs.property_id || vars.GA_PROPERTY_ID_PRIMARY }}
        run: |
          $ErrorActionPreference = 'Stop'
          . "$env:GITHUB_WORKSPACE/scripts/google-api-common.ps1"

          $propertyId = $env:PROPERTY_ID
          if ([string]::IsNullOrWhiteSpace($propertyId)) {
            throw "No GA4 property id supplied. Pass the property_id input or set the repo Variable GA_PROPERTY_ID_PRIMARY."
          }

          $token = Get-GoogleAccessToken -Scope 'https://www.googleapis.com/auth/analytics.readonly'

          $uri = "https://analyticsdata.googleapis.com/v1beta/properties/$propertyId:runReport"
          $body = @{
            dateRanges = @(@{ startDate = '1daysAgo'; endDate = 'today' })
            metrics    = @(@{ name = 'activeUsers' })
          }
          $resp = Invoke-GoogleApi -Method POST -Uri $uri -Body $body -AccessToken $token

          $value = '0'
          if ($resp.PSObject.Properties.Name -contains 'rows' -and $resp.rows) {
            $value = $resp.rows[0].metricValues[0].value
          }
          Write-Host "GA OK property=$propertyId activeUsers(last1d)=$value"
          "## Google API Smoke`n`n- Property: ``$propertyId```n- activeUsers (last 1d): **$value**`n- Status: PASS" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
