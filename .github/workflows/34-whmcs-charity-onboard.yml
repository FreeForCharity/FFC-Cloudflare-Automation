name: '34. WHMCS - Charity Onboard (client + contacts + order) [WHMCS]'
run-name: 'WHMCS Charity Onboard${{ inputs.dry_run == false && ' (LIVE)' || ' (dry-run)' }}'

# Creates a WHMCS client, attaches Contacts, and places the onboarding order
# (pre-501c3 / 501c3) from an intake JSON. Defaults to dry-run (no writes).

on:
  workflow_dispatch:
    inputs:
      intake_json:
        description: 'Intake JSON (see examples/whmcs/onboard-501c3.example.json)'
        required: true
        type: string
      dry_run:
        description: 'Preview only (no client/contacts/order created)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  onboard:
    runs-on: windows-latest
    environment: whmcs-prod

    steps:
      - uses: actions/checkout@v5

      - name: Validate required WHMCS secrets
        shell: pwsh
        env:
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_SECRET)) {
            throw "Missing secret in environment 'whmcs-prod': ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU"
          }

      - name: Run onboarding
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://freeforcharity.org/hub/includes/api.php'
          WHMCS_API_IDENTIFIER: 'zbBEpfq5W7RCSImE0NOqoYrqIDGTkBPu'
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
          WHMCS_API_ACCESS_KEY: ${{ secrets.WHMCS_API_ACCESS_KEY }}
          INTAKE_JSON: ${{ inputs.intake_json }}
        run: |
          $ErrorActionPreference = 'Stop'
          $intake = $env:INTAKE_JSON
          if ('${{ inputs.dry_run }}' -eq 'false') {
            & pwsh -NoProfile -File .\scripts\whmcs-charity-onboard.ps1 -IntakeJson $intake
          }
          else {
            & pwsh -NoProfile -File .\scripts\whmcs-charity-onboard.ps1 -IntakeJson $intake -DryRun
          }
          if ($LASTEXITCODE -ne 0) { throw "Onboarding failed (exit $LASTEXITCODE)." }
