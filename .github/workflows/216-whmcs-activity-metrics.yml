name: '216. WHMCS - Activity Metrics (full history, no PII) [WHMCS]'
run-name: 'WHMCS Activity Metrics (full history)'

# Phase 1 of docs/whmcs-data-quality-and-metrics-plan.md: per-year ACTIVE
# nonprofit members from dated evidence (invoices, orders, service
# registrations) spanning the full 10+ years — the series status flags cannot
# provide. Aggregate integer counts only. Dispatch-only.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description:
          'WHMCS API endpoint (e.g., https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php)'
        required: false
        type: string
        default: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
      charity_gids:
        description: 'Product group ids that mark a client as a nonprofit member'
        required: false
        type: string
        default: '2,5,6,7,8'
      output_file:
        description: 'Output JSON filename'
        required: false
        type: string
        default: 'artifacts/whmcs/whmcs_activity_metrics.json'

permissions:
  contents: read
  id-token: write

jobs:
  activity_metrics:
    runs-on: windows-latest
    environment: whmcs-prod-read

    steps:
      - uses: actions/checkout@v7

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          scope: read
          azure-client-id: ${{ vars.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Build activity matrix (read-only, no PII)
        shell: pwsh
        env:
          WHMCS_API_URL: ${{ inputs.api_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $out = "${{ inputs.output_file }}"

          & pwsh -NoProfile -File .\scripts\whmcs-activity-metrics.ps1 -ApiUrl $env:WHMCS_API_URL -OutputFile $out -CharityGids '${{ inputs.charity_gids }}'

          if ($LASTEXITCODE -ne 0) {
            throw "WHMCS activity metrics script failed with exit code $LASTEXITCODE. See logs above."
          }

          if (-not (Test-Path $out)) {
            throw "Expected output file not found: $out"
          }

      - name: Upload metrics artifact (aggregate only)
        uses: actions/upload-artifact@v6
        with:
          name: whmcs_activity_metrics
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
