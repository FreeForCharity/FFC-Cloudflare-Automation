name: '35. WHMCS - Open Ticket (manual) [WHMCS]'
run-name: 'WHMCS Open Ticket'

# Manually open a WHMCS support ticket (new request or break/fix logging).
# Defaults to dry-run (no ticket created).

on:
  workflow_dispatch:
    inputs:
      deptid:
        description: 'Department id (see config/whmcs-support-departments.json; FFC default = 1)'
        required: true
        type: string
        default: '1'
      subject:
        description: 'Ticket subject'
        required: true
        type: string
      message:
        description: 'Ticket message'
        required: true
        type: string
      client_email:
        description: 'Charity contact email (used if client id unknown)'
        required: false
        type: string
      client_id:
        description: 'WHMCS client id (preferred; links ticket to charity)'
        required: false
        type: string
      priority:
        description: 'Priority'
        required: false
        type: choice
        options: ['Low', 'Medium', 'High']
        default: 'Medium'
      dry_run:
        description: 'Preview only (no ticket created)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  open_ticket:
    runs-on: windows-latest
    environment: whmcs-prod

    steps:
      - uses: actions/checkout@v5

      - name: Validate required WHMCS secrets
        shell: pwsh
        env:
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_SECRET)) {
            throw "Missing secret in environment 'whmcs-prod': ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU"
          }

      - name: Open ticket
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://freeforcharity.org/hub/includes/api.php'
          WHMCS_API_IDENTIFIER: 'zbBEpfq5W7RCSImE0NOqoYrqIDGTkBPu'
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
          WHMCS_API_ACCESS_KEY: ${{ secrets.WHMCS_API_ACCESS_KEY }}
          TICKET_SUBJECT: ${{ inputs.subject }}
          TICKET_MESSAGE: ${{ inputs.message }}
          TICKET_EMAIL: ${{ inputs.client_email }}
        run: |
          $ErrorActionPreference = 'Stop'
          $cliArgs = @(
            '-DeptId', '${{ inputs.deptid }}',
            '-Subject', $env:TICKET_SUBJECT,
            '-Message', $env:TICKET_MESSAGE,
            '-Priority', '${{ inputs.priority }}'
          )
          if ('${{ inputs.client_id }}' -ne '') { $cliArgs += @('-ClientId', '${{ inputs.client_id }}') }
          elseif ($env:TICKET_EMAIL -ne '') { $cliArgs += @('-Email', $env:TICKET_EMAIL, '-Name', $env:TICKET_EMAIL) }
          if ('${{ inputs.dry_run }}' -ne 'false') { $cliArgs += '-DryRun' }

          & pwsh -NoProfile -File .\scripts\whmcs-ticket-open.ps1 @cliArgs
          if ($LASTEXITCODE -ne 0) { throw "Open ticket failed (exit $LASTEXITCODE)." }
