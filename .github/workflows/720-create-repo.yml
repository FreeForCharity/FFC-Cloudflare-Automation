name: '720. Repo - Create GitHub Repo [Repo]'

on:
  workflow_dispatch:
    inputs:
      RepoName:
        description: 'Name of the new repository (Format: FFC-EX-<domainname>)'
        required: true
        type: string
      Description:
        description: 'Description of the repository'
        required: false
        default: 'Created via automation'
        type: string
      TemplateRepo:
        description: 'Template repository to use'
        required: true
        default: 'FreeForCharity/FFC_Single_Page_Template'
        type: choice
        options:
          - FreeForCharity/FFC_Single_Page_Template
          - FreeForCharity/FFC-IN-Single_Page_Template_Jekell
      Visibility:
        description: 'Visibility (private repos get NO tier-team grants — Option C policy)'
        required: true
        default: 'public'
        type: choice
        options:
          - public
          - private
      EnableIssues:
        description: 'Enable Issues'
        required: false
        default: true
        type: boolean
      EnablePages:
        description: 'Enable GitHub Pages'
        required: false
        default: false
        type: boolean
      PagesDomainType:
        description: 'GitHub Pages domain configuration'
        required: false
        default: 'apex'
        type: choice
        options:
          - apex
          - staging
          - github-default
      CNAME:
        description: 'Custom Domain (CNAME) - Leave empty to auto-detect based on PagesDomainType'
        required: false
        type: string
      DryRun:
        description: 'Dry Run (Preview only)'
        required: false
        default: false
        type: boolean

jobs:
  # Reality check BEFORE the approval gate: refuse to proceed when the repository already
  # exists (in ANY casing — the API lookup is case-insensitive and returns the canonical
  # name). Runs ungated so a doomed create fails fast without consuming a human approval.
  # Added after the 2026-07-18 incident: four creates were dispatched (and approved) for
  # repos that already existed under the same or different casing.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify target name is free
        env:
          GH_TOKEN: ${{ github.token }}
          IN_REPO: ${{ inputs.RepoName }}
        shell: bash
        run: |
          set -euo pipefail

          repo="${IN_REPO:-}"
          owner="FreeForCharity"
          name="${repo##*/}"
          if printf '%s' "$repo" | grep -q '/'; then owner="${repo%%/*}"; fi

          set +e
          resp=$(gh api "repos/$owner/$name" 2>&1)
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            canonical=$(printf '%s' "$resp" | jq -r '.full_name // empty' 2>/dev/null || true)
            echo "::error::Repository already exists as ${canonical:-$owner/$name} — nothing to create. To regenerate its content, use workflow 702 (clone-deploy); to retire it, use 736 (archive)."
            {
              echo "## Create preflight — $owner/$name"
              echo "⛔ Refused: already exists as \`${canonical:-$owner/$name}\` (lookup is case-insensitive)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if ! printf '%s' "$resp" | grep -q "HTTP 404"; then
            echo "::error::Preflight could not verify $owner/$name (transient API error?). Failing safe rather than guessing. Details: $resp"
            exit 1
          fi
          echo "✅ $owner/$name is free — proceeding to the gated create." >> "$GITHUB_STEP_SUMMARY"

  create-repo:
    runs-on: windows-latest
    needs: preflight
    environment: github-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create Repository
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }} # Needs repo creation permissions
        run: |
          $ErrorActionPreference = 'Stop'
          $params = @{
              RepoName            = "${{ inputs.RepoName }}"
              Description         = "${{ inputs.Description }}"
              TemplateRepo        = "${{ inputs.TemplateRepo }}"
              Visibility          = "${{ inputs.Visibility }}"
              EnableIssues        = [System.Convert]::ToBoolean("${{ inputs.EnableIssues }}")
              EnablePages         = [System.Convert]::ToBoolean("${{ inputs.EnablePages }}")
              PagesDomainType     = "${{ inputs.PagesDomainType }}"
              DryRun              = [System.Convert]::ToBoolean("${{ inputs.DryRun }}")
          }

          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.CNAME }}")) {
              $params.Add("CNAME", "${{ inputs.CNAME }}")
          }

          ./scripts/Create-GitHubRepo.ps1 @params
          if ($LASTEXITCODE -ne 0) {
            throw "Create-GitHubRepo.ps1 failed with exit code $LASTEXITCODE"
          }

      - name: Grant FFC-ORGWIDE-* tier teams default access (PUBLIC repos only)
        if: ${{ inputs.DryRun != true && inputs.Visibility == 'public' }}
        env:
          GH_TOKEN: ${{ secrets.CBM_TOKEN }}
        shell: pwsh
        run: |
          # Auto-grant FFC-ORGWIDE-* tier teams on PUBLIC repos only.
          # Private repos start with zero team grants — by design (Option C
          # defensive isolation). Explicit team access on private repos must
          # be granted out-of-band by an Owner, ensuring conscious decision
          # about who can see sensitive internal/admin/payment data.
          # See: FFC-IN-Zeffy-Management, FFC-IN-ClarkeMoyerAdmin, etc.
          # RepoName may be owner-qualified ("owner/repo"). Tier teams exist
          # only in FreeForCharity, so parse and skip other owners outright.
          $repoInput = "${{ inputs.RepoName }}"
          $owner = 'FreeForCharity'
          $repo = $repoInput
          if ($repoInput -like '*/*') {
            $owner, $repo = $repoInput -split '/', 2
          }
          if ($owner -ne 'FreeForCharity') {
            Write-Host "Target owner '$owner' is not FreeForCharity; tier teams do not apply. Skipping."
            exit 0
          }
          $teams = @(
            @{ slug = 'ffc-orgwide-admins';      permission = 'admin'    },
            @{ slug = 'ffc-orgwide-maintainers'; permission = 'maintain' },
            @{ slug = 'ffc-orgwide-writers';     permission = 'push'     },
            @{ slug = 'ffc-orgwide-triagers';    permission = 'triage'   },
            @{ slug = 'ffc-orgwide-readers';     permission = 'pull'     }
          )
          $fails = 0
          foreach ($t in $teams) {
            $slug = $t.slug
            $perm = $t.permission
            try {
              gh api -X PUT "orgs/FreeForCharity/teams/$slug/repos/FreeForCharity/$repo" -f "permission=$perm" | Out-Null
              if ($LASTEXITCODE -eq 0) {
                Write-Host "  [OK] $slug -> $perm on $repo"
              } else {
                Write-Host "  [WARN] $slug grant returned exit $LASTEXITCODE"
                $fails++
              }
            } catch {
              Write-Host "  [FAIL] $slug : $_"
              $fails++
            }
          }
          if ($fails -gt 0) {
            Write-Host "::warning::$fails team grants failed; drift-audit will catch on next run."
          }

      - name: Skip team grants for PRIVATE repo (Option C policy)
        if: ${{ inputs.DryRun != true && inputs.Visibility != 'public' }}
        shell: bash
        run: |
          echo "::notice::Repo is ${{ inputs.Visibility }} — skipping FFC-ORGWIDE-* tier team grants."
          echo "::notice::Private repos require explicit team grants by an Owner. Manage at:"
          # RepoName may already be owner-qualified; only prefix the org when bare.
          repo_input="${{ inputs.RepoName }}"
          case "$repo_input" in
            */*) full="$repo_input" ;;
            *)   full="FreeForCharity/$repo_input" ;;
          esac
          echo "::notice::  https://github.com/$full/settings/access"
