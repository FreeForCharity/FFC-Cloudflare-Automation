name: '801. Candid - Charity Check (EIN) [CANDID]'
run-name: 'Candid Charity Check: ${{ inputs.ein }}'

# Read-only: validates a nonprofit's IRS 501(c)(3) / Pub78 / BMF / OFAC standing via the Candid
# Charity Check v1 API. Used to verify an applicant's EIN during charity onboarding and to
# re-verify existing partners. Key comes from Azure Key Vault at run time via OIDC
# (candid-keys-from-kv); see docs/candid-api-and-mcp.md for the one-time setup.

on:
  workflow_dispatch:
    inputs:
      ein:
        description: 'Organization EIN (e.g. 46-2471893; punctuation optional)'
        required: true
        type: string
      output_file:
        description: 'Output JSON filename (raw API response)'
        required: false
        type: string
        default: 'artifacts/candid/charity_check.json'

permissions:
  contents: read
  id-token: write

jobs:
  charity_check:
    runs-on: windows-latest
    environment: candid-prod-read

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Validate required Azure secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_KV_CLIENT_ID secret is not set (environment: candid-prod-read)";
            exit 1;
          fi
          if [ -z "${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}" ]; then
            echo "::error::READ_ALL_FFC_AZURE_TENANT_ID secret is not set (environment: candid-prod-read)";
            exit 1;
          fi

      # Candid key from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/candid-keys-from-kv
        with:
          scope: read
          apis: charity-check
          azure-client-id: ${{ secrets.READ_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.READ_ALL_FFC_AZURE_TENANT_ID }}

      - name: Charity Check lookup (read-only)
        id: check
        shell: pwsh
        env:
          INPUT_EIN: ${{ inputs.ein }}
          INPUT_OUTPUT_FILE: ${{ inputs.output_file }}
        run: |
          $ErrorActionPreference = 'Stop'

          # The output path is uploaded as an artifact, so keep it inside the workspace: no
          # absolute/rooted paths and no '..' traversal (which could exfiltrate runner files).
          $out = $env:INPUT_OUTPUT_FILE
          if ([string]::IsNullOrWhiteSpace($out) -or $out.Contains(':') -or [System.IO.Path]::IsPathRooted($out) -or (($out -split '[\\/]') -contains '..')) {
            throw "Invalid output_file '$out': must be a relative path inside the workspace without '..'."
          }

          & pwsh -NoProfile -File .\scripts\candid-charity-check.ps1 -Ein $env:INPUT_EIN -OutputFile $out

          if ($LASTEXITCODE -ne 0) {
            throw "Charity Check script failed with exit code $LASTEXITCODE. See logs above."
          }
          if (-not (Test-Path $env:INPUT_OUTPUT_FILE)) {
            throw "Expected output file not found: $($env:INPUT_OUTPUT_FILE)"
          }

          "## Candid Charity Check" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- EIN queried: $($env:INPUT_EIN)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Verdict fields are printed in the job log (step 'Charity Check lookup')." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Raw response artifact: candid_charity_check" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Artifacts: $($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)/artifacts" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v6
        with:
          name: candid_charity_check
          path: ${{ inputs.output_file }}
          if-no-files-found: error
          retention-days: 30
