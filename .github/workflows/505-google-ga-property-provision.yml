name: '505. Google - GA4 Property Provision (per-charity) [GOOGLE]'
run-name: 'GA4 Property Provision: ${{ inputs.domain }} (dry_run=${{ inputs.dry_run }})'

# Provision a per-charity GA4 property: one property under the FFC Supported Sites GA
# account + one web data stream for the charity's domain, reporting the measurement id
# (G-XXXX) that workflow 503 seeds into the charity's GTM container. Gated write:
# google-prod-write + dry_run defaults to true. Idempotent — an existing stream for the
# domain is reported instead of duplicated. See docs/google-api.md (one property per charity).

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Charity domain (web stream defaultUri), e.g. newcharity.org'
        required: true
        type: string
      account_id:
        description: 'GA account id (numeric). Empty = resolve by account_name.'
        required: false
        type: string
      account_name:
        description: 'GA account display name to resolve when account_id is empty'
        required: false
        default: 'FFC Supported Sites'
        type: string
      display_name:
        description: 'Property display name (default: "<domain> - GA4")'
        required: false
        type: string
      time_zone:
        description: 'Property reporting time zone'
        required: false
        default: 'America/New_York'
        type: string
      issue_number:
        description: 'Optional: issue number to comment the result back to'
        required: false
        type: string
      dry_run:
        description: 'Preview only (no create)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  issues: write

# Serialize per-domain so a re-dispatch for the same site queues behind the first
# instead of racing it, while different domains provision in parallel (a fleet
# batch into one shared group would supersede each other and mass-cancel).
concurrency:
  group: 505-google-ga-property-provision-${{ inputs.domain }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: windows-latest
    environment: google-prod-write
    steps:
      - uses: actions/checkout@v7

      - name: Validate required Azure secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}" ]; then
            echo "::error::WR_ALL_FFC_AZURE_KV_CLIENT_ID is not set (environment: google-prod-write)"; exit 1;
          fi
          if [ -z "${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}" ]; then
            echo "::error::WR_ALL_FFC_AZURE_TENANT_ID is not set (environment: google-prod-write)"; exit 1;
          fi

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          tenant-id: ${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Provision GA4 property
        shell: pwsh
        env:
          DOMAIN: ${{ inputs.domain }}
          ACCOUNT_ID: ${{ inputs.account_id }}
          ACCOUNT_NAME: ${{ inputs.account_name }}
          DISPLAY_NAME: ${{ inputs.display_name }}
          TIME_ZONE: ${{ inputs.time_zone }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = 'Stop'
          $keyFile = Join-Path $env:RUNNER_TEMP 'ffc-workspace-sa.json'
          az keyvault secret download --vault-name kv-ffc-admin-prod-cbm --name wr-all-cbm-google-workspace-service-account-key --file $keyFile
          if ($LASTEXITCODE -ne 0) { throw 'Failed to fetch the Workspace SA key from Key Vault.' }
          $subject = 'clarkemoyer@freeforcharity.org'
          $scriptArgs = @('-KeyPath', $keyFile, '-Subject', $subject, '-Domain', $env:DOMAIN)
          if ($env:ACCOUNT_ID) { $scriptArgs += @('-AccountId', $env:ACCOUNT_ID) }
          if ($env:ACCOUNT_NAME) { $scriptArgs += @('-AccountName', $env:ACCOUNT_NAME) }
          if ($env:DISPLAY_NAME) { $scriptArgs += @('-DisplayName', $env:DISPLAY_NAME) }
          if ($env:TIME_ZONE) { $scriptArgs += @('-TimeZone', $env:TIME_ZONE) }
          if ($env:DRY_RUN -ne 'false') { $scriptArgs += '-DryRun' }
          $out = & pwsh -NoProfile -File scripts/google-ga-property-provision.ps1 @scriptArgs
          $exit = $LASTEXITCODE
          Remove-Item $keyFile -Force -ErrorAction SilentlyContinue
          $text = ($out | Out-String).TrimEnd()
          Write-Host $text
          New-Item -ItemType Directory -Force -Path artifacts/google | Out-Null
          $text | Out-File -FilePath artifacts/google/ga-property-result.txt -Encoding utf8
          if ($exit -ne 0) { throw "GA property provisioning failed (exit $exit)." }
          $fence = [string][char]0x60 * 3
          @("## GA4 property provision - $($env:DOMAIN)", '', $fence, $text, $fence) |
            Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Comment result back to issue
        if: inputs.issue_number != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          DOMAIN: ${{ inputs.domain }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = 'Stop'
          $text = Get-Content -Raw artifacts/google/ga-property-result.txt
          $fence = [string][char]0x60 * 3
          $lines = @(
            "## GA4 property provision - $($env:DOMAIN) (dry_run=$($env:DRY_RUN))",
            '',
            "Run: $($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)",
            '',
            $fence, $text.TrimEnd(), $fence
          )
          $bodyFile = Join-Path $env:RUNNER_TEMP 'ga-property-comment.md'
          $lines | Out-File -FilePath $bodyFile -Encoding utf8
          gh issue comment $env:ISSUE_NUMBER --repo $env:GITHUB_REPOSITORY --body-file $bodyFile
          if ($LASTEXITCODE -ne 0) { throw "Failed to comment on issue $($env:ISSUE_NUMBER) (exit $LASTEXITCODE)." }
