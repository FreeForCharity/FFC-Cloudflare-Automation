name: '227. cPanel - Deploy WHMCS Hooks (UAPI via APIM) [cPanel]'
run-name: 'cPanel Deploy WHMCS Hooks (${{ inputs.mode }})'

# Deploys the version-controlled WHMCS hooks in whmcs/hooks/*.php to the production
# WHMCS host, replacing the manual-FTPS runbook. Writes go through the cPanel UAPI
# proxied by APIM (apim-ffc-gateway-prod), whose static egress IP (20.231.116.111)
# is allowlisted on the IP-restricted cPanel host — so a dynamic GitHub runner IP
# is never blocked.
#
#   Backend:  https://webhosting1900.is.cc:2083 (cPanel UAPI)  via  /cpanel/execute/{module}/{function}
#   Auth:     Ocp-Apim-Subscription-Key (cPanel-ops) + Authorization: cpanel <user>:<api-token>
#   Target:   public_html/hub/includes/hooks/<file>.php
#
# mode=verify (default) is READ-ONLY: it reads the deployed file back and reports whether it
# matches the repo. mode=deploy writes each file, then reads it back and fails on any mismatch.
#
# CONFIRM BEFORE FIRST DEPLOY (flagged, sensible defaults):
#   1. apim-subscription-secret-name — defaults to read-all-ffc-apim-gateway-subscription-key;
#      confirm that is the "cPanel ops (CI)" subscription key (or add a dedicated
#      *-ffc-apim-cpanel-subscription-key and pass it).
#   2. target_dir — defaults to public_html/hub/includes/hooks (relative to the cPanel home).

on:
  workflow_dispatch:
    inputs:
      mode:
        description:
          'verify = read-only (deployed vs repo); deploy = write the hook files to production'
        required: false
        type: choice
        options:
          - verify
          - deploy
        default: verify
      hooks:
        description: 'Comma-separated hook filenames (blank = all whmcs/hooks/*.php).'
        required: false
        type: string
        default: ''
      target_dir:
        description: 'cPanel directory (relative to home) the hooks live in.'
        required: false
        type: string
        default: 'public_html/hub/includes/hooks'
      apim_subscription_secret_name:
        description: 'KV secret name of the APIM cpanel-ops subscription key.'
        required: false
        type: string
        default: 'read-all-ffc-apim-gateway-subscription-key'

# Serialize deploys so two writes never race.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy_hooks:
    runs-on: ubuntu-latest
    environment: whmcs-prod
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Lint hooks (php -l)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          php -v | head -1
          n=0
          for f in whmcs/hooks/*.php; do
            echo "== php -l $f"
            php -l "$f"
            n=$((n+1))
          done
          echo "linted $n hook file(s)"
          test "$n" -gt 0 || { echo "::error::no hook files found under whmcs/hooks/"; exit 1; }

      - name: Load cPanel credentials from Key Vault (OIDC)
        uses: ./.github/actions/cpanel-secrets-from-kv
        with:
          scope: 'read'
          apim-subscription-secret-name: ${{ inputs.apim_subscription_secret_name }}
          azure-client-id: ${{ vars.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Deploy / verify hooks via cPanel UAPI (APIM)
        shell: pwsh
        env:
          MODE: ${{ inputs.mode }}
          HOOKS: ${{ inputs.hooks }}
          TARGET_DIR: ${{ inputs.target_dir }}
        run: |
          $ErrorActionPreference = 'Stop'
          $base = 'https://apim-ffc-gateway-prod.azure-api.net/cpanel'
          $dir = $env:TARGET_DIR
          $headers = @{
            'Ocp-Apim-Subscription-Key' = $env:CPANEL_APIM_SUBSCRIPTION_KEY
            'Authorization'             = "cpanel $($env:CPANEL_API_USER):$($env:CPANEL_API_TOKEN)"
          }

          # --- Harden the hook selection (path-traversal defense) ---------------
          # Every requested entry MUST be a bare *.php basename (no '/', '\', '..')
          # and MUST resolve to an existing file DIRECTLY under whmcs/hooks/. The
          # validated basename is the ONLY value used for the remote `file` param.
          # This runs BEFORE any network call so a bad name never reaches cPanel.
          $hooksRoot = (Resolve-Path -LiteralPath 'whmcs/hooks').ProviderPath

          function Resolve-HookFile {
            param([string]$Requested)
            $name = ([string]$Requested).Trim()
            if ($name -notmatch '^[A-Za-z0-9._-]+\.php$') {
              Write-Host "::error::invalid hook name '$Requested' — must be a bare *.php basename (no path separators or '..')"
              return $null
            }
            $full = Join-Path $hooksRoot $name
            if (-not (Test-Path -LiteralPath $full -PathType Leaf)) {
              Write-Host "::error::requested hook '$name' not found directly under whmcs/hooks/"
              return $null
            }
            # Defense-in-depth: the resolved path's parent must be exactly the hooks root.
            $resolved = (Resolve-Path -LiteralPath $full).ProviderPath
            if ((Split-Path -Parent $resolved) -ne $hooksRoot) {
              Write-Host "::error::hook '$name' resolves outside whmcs/hooks/ ($resolved)"
              return $null
            }
            return $resolved
          }

          # Same validation whether HOOKS is blank (glob) or an explicit list.
          if ([string]::IsNullOrWhiteSpace($env:HOOKS)) {
            $requested = (Get-ChildItem -Path (Join-Path $hooksRoot '*.php') -File).Name
          } else {
            $requested = $env:HOOKS.Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
          }
          if (-not $requested) { Write-Host '::error::no hook files selected'; exit 1 }

          $files = @()
          $invalid = 0
          foreach ($r in $requested) {
            $resolved = Resolve-HookFile $r
            if ($null -eq $resolved) { $invalid++; continue }
            $files += [pscustomobject]@{ Name = (Split-Path -Leaf $resolved); FullName = $resolved }
          }
          if ($invalid -gt 0) { exit 1 }
          if (-not $files) { Write-Host '::error::no valid hook files selected'; exit 1 }

          # Normalize to LF and strip a single trailing newline for a stable byte compare
          # (cPanel round-trips content verbatim; this only avoids EOL/CRLF false mismatches).
          function Normalize([string]$s) { ($s -replace "`r`n", "`n").TrimEnd("`n") }

          $fail = 0
          foreach ($f in $files) {
            $name = $f.Name
            $content = Get-Content -Raw -LiteralPath $f.FullName
            if ($null -eq $content) { $content = '' }

            if ($env:MODE -eq 'deploy') {
              $body = @{ dir = $dir; file = $name; content = $content; from_charset = 'utf-8'; to_charset = 'utf-8' }
              try {
                $resp = Invoke-RestMethod -Method Post -Uri "$base/execute/Fileman/save_file_content" -Headers $headers -Body $body
              } catch {
                Write-Host "::error::save_file_content POST failed for $name : $($_.Exception.Message)"
                $fail++; continue
              }
              if ($resp.result.status -ne 1) {
                Write-Host "::error::save_file_content rejected $name : $(($resp.result.errors) -join '; ')"
                $fail++; continue
              }
              Write-Host "wrote $name -> $dir/"
            }

            # Read back (both modes) and compare to the repo copy.
            try {
              $get = Invoke-RestMethod -Method Get -Uri "$base/execute/Fileman/get_file_content?dir=$([uri]::EscapeDataString($dir))&file=$([uri]::EscapeDataString($name))" -Headers $headers
            } catch {
              Write-Host "::warning::could not read back $name : $($_.Exception.Message)"
              if ($env:MODE -eq 'deploy') { $fail++ }
              continue
            }
            if ($get.result.status -ne 1) {
              Write-Host "::warning::get_file_content did not return $name (not deployed yet?)"
              if ($env:MODE -eq 'deploy') { $fail++ }
              continue
            }
            if ((Normalize $get.result.data.content) -eq (Normalize $content)) {
              Write-Host "OK  $name — production matches repo"
            } else {
              Write-Host "::warning::$name DIFFERS between production and repo"
              if ($env:MODE -eq 'deploy') { Write-Host "::error::post-deploy mismatch for $name"; $fail++ }
            }
          }

          if ($fail -gt 0) { throw "$fail hook file(s) failed ($($env:MODE) mode)" }
          Write-Host "Done ($($env:MODE) mode)."
