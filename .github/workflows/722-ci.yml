name: '722. Repo - CI Validate and Test [Repo]'

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Validate workflow name prefixes (Actions UI order)
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(.github/workflows/*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No workflow files found under .github/workflows"
            exit 1
          fi

          declare -A seen
          has_error=false

          for f in "${files[@]}"; do
            # Extract the *first* top-level name: line.
            # (We intentionally ignore job/step 'name:' occurrences deeper in the YAML.)
            first_name_line=$(head -n 20 "$f" | sed '1s/^\xEF\xBB\xBF//' | grep -m 1 -E '^name:\s*' || true)
            if [ -z "$first_name_line" ]; then
              echo "::error file=$f::Missing top-level workflow name (expected a 'name:' near top of file)."
              has_error=true
              continue
            fi

            # Expect a leading three-digit numeric prefix like "101." in the workflow name.
            prefix=$(printf '%s' "$first_name_line" | sed -nE "s/^name:\s*['\"]?([0-9]{3})\..*/\1/p")
            if [ -z "$prefix" ]; then
              echo "::error file=$f::Workflow name must start with a three-digit numeric prefix like '101.'. Got: $first_name_line"
              has_error=true
              continue
            fi

            if [[ -n "${seen[$prefix]:-}" ]]; then
              echo "::error::Duplicate workflow name prefix '$prefix' found in: ${seen[$prefix]} and $f"
              has_error=true
              continue
            fi

            seen[$prefix]="$f"
          done

          if [ "$has_error" = true ]; then
            exit 1
          fi

          echo "✓ Workflow name prefixes are present and unique (${#seen[@]} workflows)"

      - name: Validate workflow / safety-doc consistency
        shell: bash
        run: |
          # Rejects a BOM at the start of any workflow YAML and keeps the
          # per-workflow table in docs/workflow-safety-and-approvals.md in sync
          # with the actual workflow set (coverage + no stale rows).
          python3 scripts/check-workflow-doc-consistency.py

      - name: Validate workflow catalog is regenerated
        shell: bash
        run: |
          # docs/workflow-catalog.json + the README catalog section are generated
          # from the workflow files; fail if a workflow change wasn't accompanied
          # by a regeneration (python3 scripts/generate-workflow-catalog.py).
          python3 scripts/generate-workflow-catalog.py --check

      - name: Validate workflow cross-references resolve
        shell: bash
        run: |
          # Fails when a workflow (or a helper script) dispatches / depends on a
          # sibling workflow by a stale file name, or dispatches a workflow that
          # has no workflow_dispatch trigger. Guards the #630 failure class.
          python3 scripts/check-workflow-references.py

      - name: Validate federated-credential expected map
        shell: bash
        run: |
          # Self-check config/federated-credentials.json is well-formed (GUIDs,
          # env slugs, no dupes). The live subject audit (--live) runs against
          # Azure via the operator/#589 workflow; this CI step just keeps the
          # declarative expected map honest. Guards the #625 subject-typo class.
          python3 scripts/check-federated-credential-subjects.py

      - name: Validate GitHub Pages IP sets are in sync
        shell: bash
        run: |
          # scripts/cloudflare-api-common.ps1 is the single source of truth for
          # the GitHub Pages apex IP sets + www target (#778). The Node preflight
          # (scripts/preflight-cutover.mjs) can't call the PowerShell lib, so it
          # mirrors those sets — this guard fails if the two ever drift.
          python3 scripts/check-github-pages-ip-consistency.py

      - name: Setup Go (for actionlint)
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Lint GitHub Actions workflows
        run: '"$(go env GOPATH)/bin/actionlint" -color'

      - name: Setup Node (for Prettier)
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Workflow logic tests (embedded scripts)
        shell: bash
        run: |
          # Unit-tests the logic INSIDE workflows (github-script/bash/pwsh
          # bodies) against fixtures — the structure checks earlier in this
          # job can't catch behavior bugs like the PUBLIC/public
          # visibility-enum regression. Runs after setup-node so the
          # github-script shim executes on the pinned LTS Node, not whatever
          # the runner image happens to preinstall.
          python3 -c 'import yaml' 2>/dev/null || python3 -m pip install --quiet pyyaml
          python3 tests/workflow-logic/run_all.py

      - name: Check formatting (Prettier)
        run: |
          npx --yes prettier@3.8.1 --check . --ignore-unknown

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          Write-Host "Validating PowerShell scripts..."
          $scripts = @(
            'Update-CloudflareDns.ps1',
            'Update-StagingDns.ps1',
            'Export-CloudflareDns.ps1'
          )
          $hasErrors = $false
          foreach ($script in $scripts) {
            if (Test-Path $script) {
              Write-Host "Checking $script..." -NoNewline
              try {
                $errors = $null
                [void][System.Management.Automation.Language.Parser]::ParseInput(
                  (Get-Content $script -Raw),
                  [ref]$null,
                  [ref]$errors
                )
                if ($errors -and $errors.Count -gt 0) {
                  $messages = $errors | ForEach-Object { $_.Message } | Where-Object { $_ } | Select-Object -Unique
                  throw "Syntax errors in '$script': $($messages -join '; ')"
                }
                Write-Host " OK" -ForegroundColor Green
              } catch {
                Write-Host " FAILED" -ForegroundColor Red
                Write-Error $_.Exception.Message
                $hasErrors = $true
              }
            } else {
              Write-Error "Script not found: $script"
              $hasErrors = $true
            }
          }
          if ($hasErrors) {
            exit 1
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Lint PowerShell (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module PSScriptAnalyzer
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Error','Warning') | Where-Object { $_.ScriptPath -like '*.ps1' }
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }

          if ($warnings) {
            Write-Host "PSScriptAnalyzer warnings:" -ForegroundColor Yellow
            $warnings | Select-Object RuleName,Severity,Message,Line | Format-Table -AutoSize | Out-String | Write-Host
          }

          if ($errors) {
            Write-Host "PSScriptAnalyzer errors:" -ForegroundColor Red
            $errors | Select-Object RuleName,Severity,Message,Line | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer found $($errors.Count) error(s)."
          }

      - name: Check PowerShell formatting (Invoke-Formatter)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module PSScriptAnalyzer

          $excludePattern = '([/\\]node_modules[/\\]|[/\\]\.git[/\\]|[/\\]\.venv[/\\])'
          $files = Get-ChildItem -Path . -Filter *.ps1 -File -Recurse | Where-Object { $_.FullName -notmatch $excludePattern }
          if (-not $files -or $files.Count -eq 0) {
            Write-Host "No .ps1 files found."
            exit 0
          }

          $changed = @()
          foreach ($file in $files) {
            $original = Get-Content -Path $file.FullName -Raw
            $formatted = Invoke-Formatter -ScriptDefinition $original
            if ($formatted -ne $original) {
              $changed += $file.FullName
            }
          }

          if ($changed.Count -gt 0) {
            Write-Host "PowerShell formatting differs for:" -ForegroundColor Red
            $changed | ForEach-Object { Write-Host " - $_" }
            throw "Invoke-Formatter check failed. Run Invoke-Formatter locally to update files."
          }

      - name: Run PowerShell unit tests (Pester)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path scripts/tests)) {
            Write-Host 'No scripts/tests directory; skipping Pester.'
            exit 0
          }
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version.Major -ge 5 })) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }
          Invoke-Pester -Path scripts/tests -Output Detailed -CI

      - name: Check for sensitive files
        run: |
          echo "Checking for accidentally committed sensitive files..."

          found_sensitive=false

          # Check for sensitive patterns
          sensitive_patterns=(
            "*.pem"
            "*.key"
            ".env"
            ".env.local"
          )

          for pattern in "${sensitive_patterns[@]}"; do
            if find . -name "$pattern" -not -path "./.git/*" | grep -q .; then
              echo "ERROR: Found sensitive files matching pattern: $pattern"
              find . -name "$pattern" -not -path "./.git/*"
              found_sensitive=true
            fi
          done

          if [ "$found_sensitive" = true ]; then
            echo "ERROR: Sensitive files found in repository!"
            exit 1
          fi
          echo "✓ No sensitive files found"

      - name: Verify README exists
        run: |
          if [ ! -f "README.md" ]; then
            echo "Error: README.md not found"
            exit 1
          fi
          echo "✓ README.md exists"
