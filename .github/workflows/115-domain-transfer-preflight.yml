name: '115. Domain - Transfer Readiness Preflight (Report) [WHMCS]'
run-name: 'Transfer Preflight'

# READ-ONLY: exports WHMCS domains, then runs scripts/domain-transfer-preflight.ps1
# offline to classify each domain's readiness to transfer to Cloudflare Registrar
# (eNOM -> Cloudflare; project #157). Initiates no transfer and spends no money.

on:
  workflow_dispatch:
    inputs:
      min_days_to_expiry:
        description: 'Minimum days to expiry to treat a domain as transfer-ready'
        required: false
        type: number
        default: 15
      post_reg_lock_days:
        description: 'Days since registration before a transfer is allowed (ICANN)'
        required: false
        type: number
        default: 60
      issue_number:
        description: 'Optional: issue number to comment the summary back to'
        required: false
        type: number

permissions:
  contents: read
  issues: write

jobs:
  export_whmcs:
    runs-on: windows-latest
    environment: whmcs-prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      # WHMCS credential from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/whmcs-secrets-from-kv
        with:
          azure-client-id: ${{ vars.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Export WHMCS domains (read-only)
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php'
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifacts/transfer | Out-Null
          & pwsh -NoProfile -File .\scripts\whmcs-domain-export.ps1 -OutputFile artifacts/transfer/whmcs_domains.csv
          if ($LASTEXITCODE -ne 0) { throw "WHMCS export failed (exit $LASTEXITCODE)." }

      - name: Upload WHMCS export
        uses: actions/upload-artifact@v6
        with:
          name: transfer-whmcs-domains
          path: artifacts/transfer/whmcs_domains.csv
          if-no-files-found: error

  preflight:
    runs-on: ubuntu-latest
    needs: [export_whmcs]

    steps:
      - uses: actions/checkout@v5

      - name: Download WHMCS export
        uses: actions/download-artifact@v7
        with:
          name: transfer-whmcs-domains
          path: artifacts/transfer

      - name: Derive 'in Cloudflare' zone set from Sites Master List
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Join key for the preflight's inCloudflareZone gate: every domain the
          # committed Sites Master List marks as already in Cloudflare. Read-only.
          $cf = Import-Csv sites-list/sites_list.csv |
            Where-Object { $_.'In Cloudflare' -eq 'Yes' } |
            ForEach-Object { [pscustomobject]@{ zone = ($_.Domain).Trim().ToLowerInvariant() } } |
            Where-Object { $_.zone }
          $cf | Sort-Object zone -Unique |
            Export-Csv artifacts/transfer/cf_zones.csv -NoTypeInformation -Encoding utf8
          Write-Host ("Cloudflare zones (from master list): {0}" -f @($cf).Count)

      - name: Run transfer-readiness preflight (offline)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifacts/transfer/runbooks | Out-Null

          $ErrorActionPreference = 'Continue'
          $out = & pwsh -NoProfile -File .\scripts\domain-transfer-preflight.ps1 `
            -WhmcsDomainsCsv artifacts/transfer/whmcs_domains.csv `
            -CloudflareZonesCsv artifacts/transfer/cf_zones.csv `
            -OutputFile artifacts/transfer/domain_transfer_preflight.csv `
            -RunbookDir artifacts/transfer/runbooks `
            -MinDaysToExpiry ${{ inputs.min_days_to_expiry }} `
            -PostRegLockDays ${{ inputs.post_reg_lock_days }}
          $exit = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          if ($exit -ne 0) { throw "domain-transfer-preflight.ps1 failed (exit $exit)." }

          $summary = ($out | Out-String)
          Write-Host $summary
          # Persist the script's own summary JSON so the issue-comment step can
          # read authoritative counts instead of re-parsing the CSV.
          $summary.TrimEnd() | Out-File -FilePath artifacts/transfer/preflight_summary.json -Encoding utf8
          $fence = [string][char]0x60 * 3
          $lines = @('### Domain transfer preflight summary', '', ($fence + 'json'), $summary.TrimEnd(), $fence)
          $lines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Build Cat1-ready (in WHMCS + in Cloudflare + ready) report
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rows = Import-Csv artifacts/transfer/domain_transfer_preflight.csv

          # Target set for project #157: in WHMCS (every preflight row is) AND in
          # a Cloudflare zone AND readiness=ready -> the Cat1-ready transfer list.
          $readyInCf = $rows |
            Where-Object { $_.inCloudflareZone -eq 'True' -and $_.readiness -eq 'ready' } |
            Sort-Object domain

          $readyInCf |
            Select-Object domain, currentRegistrar, daysToExpiry, daysSinceRegistration, httpHealth |
            Export-Csv artifacts/transfer/cat1_ready_in_cloudflare.csv -NoTypeInformation -Encoding utf8

          $inCfAny = @($rows | Where-Object { $_.inCloudflareZone -eq 'True' }).Count
          Write-Host ("in-Cloudflare (any readiness): {0}" -f $inCfAny)
          Write-Host ("Cat1-ready (in CF + ready):    {0}" -f @($readyInCf).Count)

          $md = New-Object System.Collections.Generic.List[string]
          $md.Add('### Cat1-ready: in WHMCS + in Cloudflare + ready to transfer')
          $md.Add('')
          $md.Add(("In-Cloudflare domains (any readiness): **{0}** — of those, **{1}** are ready." -f $inCfAny, @($readyInCf).Count))
          $md.Add('')
          if (@($readyInCf).Count -gt 0) {
            $md.Add('| domain | registrar | daysToExpiry | daysSinceReg | httpHealth |')
            $md.Add('| --- | --- | ---: | ---: | --- |')
            foreach ($r in $readyInCf) {
              $md.Add(("| {0} | {1} | {2} | {3} | {4} |" -f $r.domain, $r.currentRegistrar, $r.daysToExpiry, $r.daysSinceRegistration, $r.httpHealth))
            }
          } else {
            $md.Add('_No domains currently pass the in-Cloudflare + ready gates._')
          }
          $md | Out-File -FilePath artifacts/transfer/cat1_ready_in_cloudflare.md -Encoding utf8
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Probe registry truth (RDAP) for the in-Cloudflare set
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # WHMCS expiry/status is frequently stale (it has wrongly marked live
          # domains "Expired"/"Cancelled"). Resolve the authoritative registrar of
          # record, real expiry, and transfer-lock state from the registry (RDAP)
          # for every in-Cloudflare zone. Read-only; no secrets, no money.
          & pwsh -NoProfile -File .\scripts\domain-registry-probe.ps1 `
            -DomainsCsv artifacts/transfer/cf_zones.csv `
            -OutputFile artifacts/transfer/registry_truth.csv | Out-Host
          if ($LASTEXITCODE -ne 0) { throw "domain-registry-probe.ps1 failed (exit $LASTEXITCODE)." }

      - name: Build registry-truth transfer worklist
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $reg = Import-Csv artifacts/transfer/registry_truth.csv

          # Join site health + WHMCS status from the Master List so the worklist
          # shows where the registry contradicts WHMCS.
          $sites = @{}
          foreach ($s in (Import-Csv sites-list/sites_list.csv)) {
            $d = ($s.Domain).Trim().ToLowerInvariant()
            if ($d -and -not $sites.ContainsKey($d)) { $sites[$d] = $s }
          }

          $order = 'ENOM_READY','ENOM_LOCKED','ENOM_EXPIRED','OTHER','UNREGISTERED','UNKNOWN','AT_CLOUDFLARE'
          $titles = @{
            ENOM_READY   = 'eNom — unlocked, not expired → transfer to Cloudflare now'
            ENOM_LOCKED  = 'eNom — clientTransferProhibited → unlock at eNom first'
            ENOM_EXPIRED = 'eNom — registry expiry in the past → renew first'
            OTHER        = 'Registrar is NOT FFC (not Cloudflare/eNom) → investigate'
            UNREGISTERED = 'No registry record → dropped / available → investigate'
            UNKNOWN      = 'No RDAP server for TLD or lookup errored → manual WHOIS'
            AT_CLOUDFLARE= 'Already at Cloudflare (migration complete)'
          }

          $joined = foreach ($r in $reg) {
            $s = $sites[$r.domain]
            [pscustomobject]@{
              domain            = $r.domain
              bucket            = $r.bucket
              registrarOfRecord = $r.registrarOfRecord
              registryExpiry    = $r.registryExpiry
              transferLocked    = $r.transferLocked
              siteHealth        = if ($s) { $s.'Site Health' } else { '' }
              whmcsStatus       = if ($s) { $s.Status } else { '' }
            }
          }
          $joined | Export-Csv artifacts/transfer/registry_truth_worklist.csv -NoTypeInformation -Encoding utf8

          $md = New-Object System.Collections.Generic.List[string]
          $md.Add('### Registry-truth transfer worklist (RDAP, authoritative)')
          $md.Add('')
          foreach ($b in $order) {
            $rows = @($joined | Where-Object { $_.bucket -eq $b })
            $md.Add(("- **{0}** ({1}): {2}" -f $b, $rows.Count, $titles[$b]))
          }
          $md.Add('')
          foreach ($b in $order) {
            $rows = @($joined | Where-Object { $_.bucket -eq $b } |
              Sort-Object @{ e = { $_.siteHealth -ne 'Live' } }, domain)
            if ($rows.Count -eq 0) { continue }
            $md.Add(("#### {0} ({1})" -f $b, $rows.Count))
            $md.Add('| domain | registrar | registryExpiry | locked | siteHealth | whmcsStatus |')
            $md.Add('| --- | --- | --- | --- | --- | --- |')
            foreach ($r in $rows) {
              $md.Add(("| {0} | {1} | {2} | {3} | {4} | {5} |" -f `
                $r.domain, $r.registrarOfRecord, $r.registryExpiry, $r.transferLocked, $r.siteHealth, $r.whmcsStatus))
            }
            $md.Add('')
          }
          $md | Out-File -FilePath artifacts/transfer/registry_truth_worklist.md -Encoding utf8
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload preflight results
        uses: actions/upload-artifact@v6
        with:
          name: domain-transfer-preflight
          path: |
            artifacts/transfer/domain_transfer_preflight.csv
            artifacts/transfer/preflight_summary.json
            artifacts/transfer/cf_zones.csv
            artifacts/transfer/cat1_ready_in_cloudflare.csv
            artifacts/transfer/cat1_ready_in_cloudflare.md
            artifacts/transfer/registry_truth.csv
            artifacts/transfer/registry_truth_worklist.csv
            artifacts/transfer/registry_truth_worklist.md
            artifacts/transfer/runbooks/*.md
          if-no-files-found: error

      - name: Comment summary back to issue
        if: ${{ inputs.issue_number != '' && inputs.issue_number != 0 }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const issueNumber = Number('${{ inputs.issue_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let table = '';
            try {
              const s = JSON.parse(fs.readFileSync('artifacts/transfer/preflight_summary.json', 'utf8'));
              table = `- ready: **${s.ready}**\n- blocked: **${s.blocked}**\n- review: **${s.review}**\n- done: **${s.done}**\n- total: **${s.total}**`;
            } catch (e) {
              table = '(could not read preflight summary)';
            }
            let cat1 = '';
            try {
              cat1 = fs.readFileSync('artifacts/transfer/cat1_ready_in_cloudflare.md', 'utf8').trim();
            } catch (e) {
              cat1 = '_(Cat1-ready report not available)_';
            }
            let registry = '';
            try {
              const rows = fs.readFileSync('artifacts/transfer/registry_truth.csv', 'utf8')
                .trim().split('\n').slice(1);
              const counts = {};
              for (const line of rows) {
                const b = (line.split(',').pop() || '').replace(/"/g, '').trim();
                counts[b] = (counts[b] || 0) + 1;
              }
              const order = ['ENOM_READY','ENOM_LOCKED','ENOM_EXPIRED','OTHER','UNREGISTERED','UNKNOWN','AT_CLOUDFLARE'];
              registry = '### Registry truth (RDAP — authoritative registrar/expiry)\n' +
                order.filter(b => counts[b]).map(b => `- ${b}: **${counts[b]}**`).join('\n');
            } catch (e) {
              registry = '_(registry-truth probe not available)_';
            }
            const body = [
              `Transfer readiness preflight results`,
              '',
              table,
              '',
              cat1,
              '',
              registry,
              '',
              `Full CSV + per-domain runbooks: see the Artifacts section of ${runUrl}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
