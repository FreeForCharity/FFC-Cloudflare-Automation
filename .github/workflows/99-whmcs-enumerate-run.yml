name: '99. WHMCS - Enumerate Products (temp push-run) [WHMCS]'
run-name: 'WHMCS Enumerate Products (push)'

# TEMPORARY: triggers on push to the onboarding branch so the products catalog
# (incl. discovered custom fields) is printed to the job log for enumeration.
# Workflow-dispatch is not available to the automation token, but push is.
# Remove this file once the catalog has been captured.

on:
  push:
    branches:
      - claude/whmcs-version-updates-5g2s5s
    paths:
      - '.github/workflows/99-whmcs-enumerate-run.yml'

permissions:
  contents: read

jobs:
  enumerate:
    runs-on: windows-latest
    environment: whmcs-prod

    steps:
      - uses: actions/checkout@v5

      - name: Validate required WHMCS secrets
        shell: pwsh
        env:
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_SECRET)) {
            throw "Missing secret in environment 'whmcs-prod': ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU"
          }

      - name: Export products + client products (read-only) and print catalog
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://freeforcharity.org/hub/includes/api.php'
          WHMCS_API_IDENTIFIER: 'zbBEpfq5W7RCSImE0NOqoYrqIDGTkBPu'
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
          WHMCS_API_ACCESS_KEY: ${{ secrets.WHMCS_API_ACCESS_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'artifacts/whmcs' | Out-Null
          & pwsh -NoProfile -File .\scripts\whmcs-products-export.ps1 `
            -ApiUrl $env:WHMCS_API_URL `
            -ProductsOutputFile 'artifacts/whmcs/whmcs_products.csv' `
            -ClientProductsOutputFile 'artifacts/whmcs/whmcs_client_products.csv'
          if ($LASTEXITCODE -ne 0) { throw "WHMCS export failed (exit $LASTEXITCODE)." }

          Write-Host ''
          Write-Host '===== whmcs_products.csv ====='
          Get-Content 'artifacts/whmcs/whmcs_products.csv' | ForEach-Object { Write-Host $_ }
