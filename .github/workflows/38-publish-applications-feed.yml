name: '52. Applications Feed - Publish (PII-safe) [WHMCS]'
run-name: 'Publish applications.json feed'

# Builds the PII-safe applications/applications.json feed consumed by the
# FFCadmin public roadmap intake (FreeForCharity/FFC-IN-ffcadmin.org).
#
# A charity "application" is a WHMCS client holding an FFC onboarding product
# (pre-501c3 pid 16 / 501c3 pid 33). Donors hold no such product and are
# excluded by construction. Only non-PII fields are published (opaque id, public
# org name, optional truncated mission, service tier, date).
#
# Two jobs mirror the repo's split of environments:
#   generate  - environment whmcs-prod, calls the read-only WHMCS API
#   publish   - environment github-prod, opens the data PR with the CBM_TOKEN PAT
#               (main is protected: changes land via PR + merge queue only)
#
# Refs FreeForCharity/FFC-Cloudflare-Automation#453

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview the feed in logs without opening a PR'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC

permissions:
  contents: read

# Keep a manual run and the scheduled run from generating at the same time.
concurrency:
  group: applications-feed-publish
  cancel-in-progress: false

jobs:
  generate:
    runs-on: windows-latest
    environment: whmcs-prod
    steps:
      - uses: actions/checkout@v5

      - name: Validate required WHMCS secret
        shell: pwsh
        env:
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WHMCS_API_SECRET)) {
            throw "Missing secret in environment 'whmcs-prod': ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU"
          }

      - name: Generate applications feed (read-only)
        shell: pwsh
        env:
          WHMCS_API_URL: 'https://freeforcharity.org/hub/includes/api.php'
          WHMCS_API_IDENTIFIER: 'zbBEpfq5W7RCSImE0NOqoYrqIDGTkBPu'
          WHMCS_API_SECRET: ${{ secrets.ZBBEPFQ5W7RCSIME0NOQOYRQIDGTKBPU }}
          WHMCS_API_ACCESS_KEY: ${{ secrets.WHMCS_API_ACCESS_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $scriptArgs = @('-OutputFile', 'applications/applications.json')
          if ('${{ inputs.dry_run }}' -eq 'true') { $scriptArgs += '-DryRun' }
          & pwsh -NoProfile -File .\scripts\whmcs-applications-feed.ps1 @scriptArgs
          if ($LASTEXITCODE -ne 0) { throw "Feed generation failed (exit $LASTEXITCODE)." }

      - name: Upload feed artifact
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: applications-feed
          path: applications/applications.json
          if-no-files-found: error

  publish:
    needs: generate
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    environment: github-prod
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Validate CBM_TOKEN
        env:
          CBM_TOKEN: ${{ secrets.CBM_TOKEN }}
        run: |
          if [ -z "$CBM_TOKEN" ]; then
            echo "::error::Missing secret CBM_TOKEN in environment 'github-prod'."
            exit 1
          fi
          echo "CBM_TOKEN is present."

      - name: Download feed artifact
        uses: actions/download-artifact@v4
        with:
          name: applications-feed
          path: applications

      # main is protected (changes via PR + merge queue only), so publish the
      # regenerated feed as a pull request rather than pushing directly. Using
      # CBM_TOKEN (a PAT) so the PR can trigger required checks.
      - name: Open feed update PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CBM_TOKEN }}
          add-paths: applications/applications.json
          commit-message: 'chore(applications): automated PII-safe feed regeneration'
          branch: data/applications-feed-auto
          delete-branch: true
          title: 'chore(applications): automated applications.json feed regeneration'
          body: |
            Automated regeneration of `applications/applications.json` from the
            WHMCS onboarding products (pre-501c3 pid 16 / 501c3 pid 33).

            PII-safe: only an opaque id, the public organization name, an optional
            truncated mission excerpt, the service tier, and the submission date
            are published. Donors are excluded by construction.

            Generated by `.github/workflows/38-publish-applications-feed.yml`.
            Consumed by FreeForCharity/FFC-IN-ffcadmin.org `sync-applications.yml`.
