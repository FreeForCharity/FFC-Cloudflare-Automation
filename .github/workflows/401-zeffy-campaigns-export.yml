name: '401. Zeffy - Campaigns Export [ZEFFY]'
run-name: 'Zeffy Campaigns Export'

# Read-only export of Zeffy campaigns/events (GET /api/v1/campaigns) via OIDC -> Key Vault.
# This endpoint returns NO personal data (forms/events only: title, target, volume, dates, URLs),
# so the uploaded artifact is inherently safe to keep on this public repo. Dispatch-only (no
# schedule) while we are testing the API. One workflow per endpoint.
#
# The `deliver` job additionally publishes a public, PII-free campaign list
# (docs/data/ffc-zeffy-campaigns.json — title/url/status only) as a reviewable
# data-update PR, so the fleet smoke engine can classify a detected donation
# surface as ffc-interim (FFC-owned campaign) vs charity-specific (#744). Mirrors
# the 502 export->deliver split (github-prod gate, CBM_TOKEN) and the 703
# same-repo peter-evans data-PR pattern.

on:
  workflow_dispatch:

# Least-privilege default for the whole workflow: the export job only needs to
# read the repo (checkout) and mint an OIDC token. The write/PR scopes needed to
# publish the data PR are granted narrowly to the gated `deliver` job below.
permissions:
  contents: read
  id-token: write

jobs:
  zeffy_campaigns_export:
    runs-on: windows-latest
    environment: zeffy-prod

    steps:
      - uses: actions/checkout@v7

      # Zeffy organization API key from Key Vault at runtime via OIDC (single source of truth).
      - uses: ./.github/actions/zeffy-secrets-from-kv
        with:
          azure-client-id: ${{ vars.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          azure-tenant-id: ${{ vars.WR_ALL_FFC_AZURE_TENANT_ID }}

      - name: Export campaigns
        shell: pwsh
        env:
          # Pinned to the canonical Zeffy host. Not a workflow input so a dispatcher cannot point
          # the Bearer key at an arbitrary host on this public repo.
          ZEFFY_API_URL: 'https://api.zeffy.com'
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifacts/zeffy | Out-Null

          & pwsh -NoProfile -File .\scripts\zeffy-campaigns-export.ps1 -BaseUrl $env:ZEFFY_API_URL -OutputFile 'artifacts/zeffy/zeffy_campaigns.csv'
          if ($LASTEXITCODE -ne 0) { throw "Zeffy campaigns export failed (exit $LASTEXITCODE)." }

          $f = 'artifacts/zeffy/zeffy_campaigns.csv'
          if (-not (Test-Path $f)) { throw "Expected output file not found: $f" }

          $n = (Import-Csv $f | Measure-Object).Count
          "## Zeffy campaigns export (no PII)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- $f : $n row(s)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload campaigns CSV artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeffy_campaigns
          path: artifacts/zeffy/zeffy_campaigns.csv
          if-no-files-found: error
          retention-days: 7

  # Publish the public campaign list (title/url/status only) as a reviewable PR.
  # main is protected (changes via PR + merge queue only), so we open a data
  # update PR rather than pushing directly. Uses CBM_TOKEN (a PAT, github-prod)
  # so the PR can trigger required checks.
  deliver:
    needs: zeffy_campaigns_export
    runs-on: ubuntu-latest
    environment: github-prod
    # Only this gated job gets write + PR scopes (create-pull-request).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Validate CBM_TOKEN
        env:
          CBM_TOKEN: ${{ secrets.CBM_TOKEN }}
        run: |
          if [ -z "$CBM_TOKEN" ]; then
            echo "::error::Missing secret CBM_TOKEN in environment 'github-prod'."
            exit 1
          fi
          echo "CBM_TOKEN is present."

      - name: Download campaigns CSV artifact
        uses: actions/download-artifact@v8
        with:
          name: zeffy_campaigns
          path: artifacts/zeffy

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'

      - name: Generate public campaign list (title/url/status, no PII)
        run: |
          node scripts/zeffy-campaigns-to-public-json.js artifacts/zeffy/zeffy_campaigns.csv docs/data/ffc-zeffy-campaigns.json

      - name: Open data update PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.CBM_TOKEN }}
          add-paths: docs/data/ffc-zeffy-campaigns.json
          commit-message: 'chore(zeffy): refresh public campaign list (title/url/status)'
          branch: data/zeffy-campaigns-auto
          delete-branch: true
          title: 'chore(zeffy): refresh public Zeffy campaign list'
          body: |
            Automated refresh of `docs/data/ffc-zeffy-campaigns.json` from the
            401 Zeffy campaigns export (title/url/status only; no PII).

            Consumed by the fleet smoke engine to classify a detected donation
            surface as `ffc-interim` (FFC-owned campaign) vs charity-specific (#744).

            Generated by `.github/workflows/401-zeffy-campaigns-export.yml`.
