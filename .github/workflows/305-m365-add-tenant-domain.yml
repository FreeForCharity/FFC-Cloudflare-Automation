name: '305. M365 (FFC Tenant) - Add Tenant Domain (INTERNAL ONLY) [M365]'

# INTERNAL ONLY: adds the domain to the FFC Microsoft 365 tenant. NEVER run this for a charity
# that has (or will have) their own Microsoft tenant - a domain can only be verified in ONE
# tenant at a time, so adding it here blocks the charity from adding it to theirs. External
# charities add the domain in their own admin.microsoft.com first; FFC's role is DNS records
# only (workflow 105/103) or a Cloudflare domain-admin invite (workflow 122) so they can
# self-serve. See docs/m365-domain-and-dkim.md (internal vs external).
run-name: 'M365: Add domain ${{ inputs.domain }}'

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to add to tenant (e.g., example.org)'
        required: true
        type: string
      dry_run:
        description: 'Preview only (no create). Default true; set false to actually add the domain.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

# Serialize runs: a second dispatch queues behind the first instead of racing it.
concurrency:
  group: 305-m365-add-tenant-domain
  cancel-in-progress: false

jobs:
  add-tenant-domain:
    runs-on: windows-latest
    environment: m365-prod

    steps:
      - uses: actions/checkout@v7

      - name: Validate required secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not "${{ secrets.FFC_AZURE_CLIENT_ID }}") { throw 'FFC_AZURE_CLIENT_ID secret is not set (environment: m365-prod)' }
          if (-not "${{ secrets.FFC_AZURE_TENANT_ID }}") { throw 'FFC_AZURE_TENANT_ID secret is not set (environment: m365-prod)' }

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.FFC_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FFC_AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Microsoft Graph token
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $token = (az account get-access-token --resource-type ms-graph --query accessToken -o tsv)
          if (-not $token) { throw 'Failed to acquire Graph access token via Azure CLI.' }
          "GRAPH_ACCESS_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Add domain + print DNS verification records (Graph)
        shell: pwsh
        env:
          GRAPH_ACCESS_TOKEN: ${{ env.GRAPH_ACCESS_TOKEN }}
          # Pass the domain via env (not interpolated into the script line) so the input can't
          # break out of the argument.
          INPUT_DOMAIN: ${{ inputs.domain }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = 'Stop'
          $scriptArgs = @('-NoProfile', '-File', 'scripts/m365-add-tenant-domain.ps1', '-Domain', $env:INPUT_DOMAIN, '-AccessToken', $env:GRAPH_ACCESS_TOKEN)
          # Fail safe: preview unless dry_run is explicitly 'false'.
          if ($env:INPUT_DRY_RUN -ne 'false') { $scriptArgs += '-DryRun' }
          & pwsh @scriptArgs
          if ($LASTEXITCODE -ne 0) { throw "m365-add-tenant-domain failed (exit $LASTEXITCODE)." }
